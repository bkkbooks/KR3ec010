body:
  text: 卷十五石南葉狀如枇杷葉之小者但背無毛光而不皺正二月間開花冬有二葉為花苞苞既開中有十五餘花大小如椿花甚細碎每一苞約彈許大成一球一花六葉一朵有七八球淡白緑色葉末微淡赤色花既開蕊滿花但見蕊不見花花才罷去年緑葉盡脫落漸生新葉治腎衰腳弱最相宜但京洛河北河東山東頗少人以此故少用湖南北江東西二浙甚多故多用南實今醫家絶不用蜀椒須微炒使汗出又須去附紅黃殼去殼之法先微炒乘熱入竹筒中以梗舂之播取紅如未盡更揀更舂以盡為度凡用椒須如此其中子謂之椒目治盜汗尤功將目微炒搗為極細末用半錢匕以生豬上唇煎湯一合調臨睡服無不效蓋椒目能行水又治水蠱莽草今人呼為菵草濃煎湯淋泄皮膚麻痹本經一名春草諸家皆謂為草今居木部圖經亦然今世所用者皆木葉也如石楠枝梗干則皺揉之其嗅如椒爾雅釋草云菵春草釋曰今莽草也與本經合今當具言之石楠條中陶隱居注云似菵草凌冬不凋誠木無疑郁李仁其子如御李子至紅熟堪啖微澀其仁湯去皮研極爛入生龍腦點赤目陝西甚多根煎湯泄風蚛牙鼠李即牛李子也木高七八尺葉如李但狹而不澤子於條上四邊生熟則紫黑色生則青葉至秋則落子尚在枝是處皆有故經不言所出處今關陝及湖南江南北甚多木皮與子兩用欒華今長安山中亦有其子即謂之木欒子攜至京都為數珠未見其入藥杉其干端直大抵如松冬不凋但葉闊成枝廬山有萬杉寺即此杉也作屑煮汁浸洗腳氣腫滿今處處有楠材今江南等路造船場皆此木也緣木性堅而善居水久則多中空為白蟻所穴棐實大如橄欖殼色紫褐而脆其中子有一重粗黑衣其仁黃白色嚼久漸甘美五痔人常如果食之愈過多則滑腸櫸木皮今人呼為櫸柳然葉謂柳非柳謂槐非槐木最大者高五六十尺合二三人抱湖南北甚多然亦下材也不堪為器用嫩皮取以緣栲栳與箕唇白楊陝西甚多永耀間居人修蓋多此木也然易生根斫木時碎札入土即下根故易以繁植非只墟墓間於人家舍前後及夾道往往植之土地所宜爾風才至葉如大雨聲葉梗故如是又謂無風自動則無此事嘗官永耀間熟見之但風微時當風徑者其葉孤絶處則往往獨搖以其蒂細長葉重大微風雖過故往來卒無已時勢使然也其葉面青光背白木身微白故曰白楊非如粉之白欒荊即前所謂牡荊也不合更立此條況本經元無欒荊已具蔓荊實條中紫荊木春開紫花甚細碎共作朵生出無常處或生於木身之上或附根土之下直出花花罷葉出光緊微圓園圃間多植之鉤藤鉤藤中空二經不言之長八九尺或一二丈者湖南北江南江西山中皆有小人有以穴隙間致酒甕中盜取酒以氣吸之酒既出涓涓不斷專治小兒驚熱榼藤子紫黑色微光大一二寸圓扁治五痔有功燒成黑灰微存性米飲調服人多剔去肉作藥瓢垂腰間皂莢皂莢其子炒舂去赤皮仁將骨浸軟煮熟以糖漬之可食甚疏導五臟風熱壅其莢不蚛肥者微炙為末一兩入生白礬末半兩膩粉半兩風涎潮塞氣不通水調灌一二錢但過咽則須吐涎凡用白礬者分隔下涎也又暑中濕熱時或久雨合蒼朮燒闢溫疫邪濕氣柳華經曰味苦即是初生有黃蕊者也及其華干絮方出又謂之柳絮收之貼灸瘡及為茵褥絮之下連小黑子因風而起得水濕處便生如地丁之類多不因種植於人家庭院中自然生出蓋亦如柳絮兼子而飛陳藏器之説是然古人以絮為花陶隱居亦曰花隨風狀如飛雪誤矣經中有實及子汁諸家不解今人亦不見用釋氏謂柳為尼俱律陀木其子極細如人妄因極小妄果至大是知小黑子得因風而起桐葉經注不指定是何桐致難執用今具四種桐各有治療條其狀列於後一種白桐可斫琴者葉三杈開白花亦不結子藥性論云皮能治五淋沐發去頭風生髮一種荏桐早春先開淡紅花狀如豉子花成筒子子或作桐油日華子云桐油冷微毒一種梧桐四月開淡黃小花一如棗花枝頭出絲墮地成油沾漬衣履五六月結桐子今人收炒作果動風氣此是月令清明之日桐始華者一種岡桐無花不中作琴體重烏臼葉如小杏葉但微薄而緑色差淡子八九月熟初青後黑分為三瓣取子出油燃燈及染髮訶黎勒氣虛人亦宜緩緩煨熟少服此物雖澀腸而又泄氣蓋其味苦澀椿木華椿樗椿木華椿樗皆臭但一種有花結子一種無花不實世以無花不實木身大其干端直者為椿椿用木葉其有花而莢木身小干多迂矮者為樗樗用根葉莢故曰未見椿上有莢者惟樗木上有又有樗雞故知古人命名曰不言椿雞而言樗雞者以顯有雞者為樗無雞者為椿其義甚明用椿木葉樗木根葉莢者宜依此推究洛陽一女子年四十六七耽飲無度多食魚蟹攝理之方蔑如也後以飲啖過常蓄毒在臟日夜二三十瀉大便與膿血雜下大腸連肛門痛不堪忍醫以止血痢藥不效又以腸風藥則益甚蓋腸風則有血而無膿凡如此已半年餘氣血漸弱食漸減肌肉漸瘦稍服熱藥則腹愈痛血愈下服稍涼藥即泄注氣羸粥愈減服溫平藥則病不知如此將暮歲醫告術窮垂命待盡或有人教服人參散病家亦不敢主當謾與服之才一服知二服減三服膿血皆定自此不十服其疾遂愈後問其方云治大腸風虛飲酒過度挾熱下痢膿血疼痛多日不瘥樗根白皮一兩人參一兩為末每用二錢匕空心以溫酒調服如不飲酒以溫米飲代忌油膩濕面青菜果子甜物雞豬魚腥等胡椒去胃中寒痰吐水食已即吐甚驗過劑則走氣大腸寒滑亦用須各以他藥佐之橡實櫟木子也葉如栗葉在處有但堅而不堪充材亦木之性也山中以舂仁為糧然澀腸木善為炭他木皆不及其殼堪染皂若曾經雨水者其色淡不若不經雨水者槲亦有殼但少而不及櫟木所實者無石子今人合他藥染髭槲若亦有鬥但不及櫟木雖堅而不堪充材葉微炙炒槐花減槲葉之半同為末米飲調服治初得腸風及血痔熱多者尤佳亦堪為炭但不及櫟木黃藥亦治馬心肺熱有功無患子今釋子取以為念珠出佛經惟取紫紅色小者佳今入藥絶少西洛亦有之椰子椰子開之有汁如乳極甘香自別是一種氣味中又有一塊瓤形如瓜蔞上有細壠起亦白色但微虛紋若婦人裙褶其味亦如其汁又著殼一重白肉剮取之皆可與瓤糖煎為果汁色如白酒其味如瓤然謂之酒者好事者當日強名之取其殼為酒器如酒中有毒則酒沸起今人皆漆其里則全失用椰子之意樺木皮燒為黑灰合他藥治肺風毒及取皮上有紫黑花勻者裹鞍弓鐙赤柳木今謂之三春柳以其一年三秀也花肉紅色成細穗河西者戎人取滑枝為鞭京師亦甚多木鱉子蔓生歲一枯葉如蒲桃實如大栝樓熟則紅黃色微有刺不能刺人今荊南之南皆有之九月十月熟實中之子曰木鱉子但根不死春旋生苗其子一頭尖者為雄凡植時須雌雄相合麻縷纏定及其生也則去其雄者方結實木槿如小葵花淡紅色五葉成一花朝開暮斂花與枝兩用湖南北人家多種植為籬障余如經棕櫚木今人旋為器皮燒為黑灰治婦人血露及吐血仍佐之他藥每歲剮取棕皮不爾束死花如魚子泄熟淹為果柘木柘木里有紋亦可旋為器葉飼蠶曰柘蠶葉梗然不及桑葉東行根及皮煮汁釀酒治風虛耳聾有驗余如經
