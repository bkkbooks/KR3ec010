body:
  text: 卷十七石蜜嘉祐本草石蜜收蟲魚部中又見果部新聿取蘇恭説直將石字不用石蜜既自有本條煎煉亦自有法今人謂之乳糖則蟲部石蜜自是差誤不當更言石蜜也本經以謂白如膏者良由是知石蜜字乃白蜜字無疑去古既遠亦文字傳寫之誤故今人尚言白沙蜜蓋經久則陳白而沙新收者惟稀而黃次條蜜蠟故須別立目蓋是蜜之房攻治亦別至如白蠟又附於蜜蠟之下此又誤矣本是續上文敘蜜蠟之用及注所出州土不當更分之為二何者白蠟本條中蓋不言性味只是言其色白爾既有黃白二色今只言白蠟是取蠟之精英者其黃蠟只置而不言黃則蠟陳白則蠟新亦是蜜取陳蠟取新也唐注云除蜜字為佳今詳之蜜字不可除除之即不顯蠟自何處來山蜜多石中或古木中有經二三年或一得而取之氣味醇厚人家窠檻中蓄養者則一歲春秋二取之取之既數則蜜居房中日少氣味不足所以不逮陳白者日月足也雖收之才過夏亦酸壞若龕於井中近水處則免湯火傷塗之痛止仍搗薤白相和雖無毒多食亦生諸風牡蠣須燒為粉用兼以麻黃根等分同搗研為極細末粉盜汗及陰汗本方使生者則自從本方左顧經中本不言只從陶隱居説其西陽雜俎已言牡蠣言牡非為雄也且如牡丹豈可更有牝丹也今則合於地人面向午位以牡蠣頂向子視之口口在左者為左顧此物本無目如此焉得更有顧盼也桑螵蛸自採者真市中所售者恐不得盡皆桑中者蜀本圖經浸泡之法不若略蒸過為佳鄰家有一男子小便日數十次如稠米泔色亦白心神恍惚瘦瘁食減以女勞得之令服此桑螵蛸散未終一劑而愈安神魂定心志治健忘小便數補心氣桑螵蛸遠志菖蒲龍骨人參茯神當歸龜甲醋炙以上各一兩為末夜臥人參湯調下二錢如無桑上者即用余者仍須以炙桑白皮佐之量多少可也蓋桑白皮行水意以接螵蛸就腎經用桑螵蛸之意如此然治男女虛損益精陰痿夢失精遺溺疝瘕小便白濁腎衰不可闕也海蛤文蛤陳藏器所説是今海中無雁豈有食蛤糞出者若蛤殼中有肉時尚可食肉既無焉得更有糞中過數多者必為其皆無廉稜乃有是説殊不知風浪日夕淘汰故如是治傷寒汗不溜搐卻手腳海蛤川烏頭各一兩穿山甲二兩為末酒糊為丸大一寸許捏扁置所患足心下擘蔥白蓋藥以帛纏定於暖室中取熱水浸腳至膝上久則水溫又添熱水候遍身汗出為度凡一二日一次浸腳以知為度石決明經云味鹹即是肉也人採肉以供饌及干至都下北人遂為珍味肉與殼兩可用方家宜審用之然皆治目殼研水飛點磨外障翳登萊州甚多真珠小兒驚熱藥中多用河北塘濼中亦有圍及寸者色多微紅珠母與廉州珠母不相類但清水急流處其色光白水濁及不流處其色暗余如經秦龜秦龜即生於秦者秦地山中多老龜極大而壽龜甲即非只秦地有四方皆有之但取秦地所出大者為勝今河北獨流釣臺甚多取龜筒治療亦入衆藥只此二種各逐本條以其靈於物方家故用以補心然甚有驗玳瑁治心經風熱生者入藥蓋性味全也既入湯火中即不堪用為器物者是矣與生熟犀其義同鯉魚至陰之物也其鱗故三十六陰極則陽夏所以素問曰魚熱中王叔和曰熱即生風食之所以多發風熱諸家所解並不言日華子云鯉魚涼今不取只取素問為正萬一風家更使食魚則是貽禍無窮矣蠡魚今人謂之黑鯉魚道家以謂頭有星為厭世有知之者往往不敢食又發故疾亦須忌爾今用之療病亦只取其一端耳鮧魚形少類獺有四足腹重墜如囊身微紫色嘗剖之中有三小蟹又有四五小石塊如指面許小魚五七枚然無鱗與鮎鱔相類今未見用者鱔魚腹下黃世謂之黃鱔此尤動風氣多食令人霍亂屢見之向在京師鄰舍一郎官因食黃鱔遂至霍亂吐利幾至委頓又有白鱔稍粗大色白二者皆亡鱗大者長尺余其形類蛇但不能陸行然皆動風江陵府西有湖曰西湖每歲夏秋沮河水漲即湖水滿溢冬即復涸土人於乾土下掘得之每及二三尺則有往來鱔行之路中有泥水水涸又下水至復出鯽魚鯽魚開其腹內藥燒之治齒蝟皮取干皮兼刺用刺作刷治紕帛絶佳此物兼治胃逆開胃氣有功從蟲從胃有理焉膽治鷹食病世有養者去而復來久亦不去當縮身藏足之時人溺之即開合穿山甲等分燒存性治痔入肉豆蔻一半末之空肚熱米飲調二錢服隱居所説跳入虎耳及仰腹受啄之事唐本注見擯亦當然石龍子蜥蜴也今人但呼為蜴蜥大者長七八寸身有金碧色仁廟朝有一蜥蜴在右掖門西浚溝廟中此真是蜥蜴也鄭狀元有詩有樵者於澗下行見一蜥蜴自石罅中出飲水訖而入良久凡百十次尚不已樵者疑不免翻石視之有冰雹一二升樵人訝而去行方三五里大雨至良久風雹暴作今之州縣依法用此祈雨經云治五癃破石淋利水道亦此義乎露蜂房露蜂房有兩種一種小而其色淡黃窠長六七寸至一尺者闊二三寸如蜜脾下垂一邊是房多在叢木鬱翳之中世謂之牛舌蜂又一種或在高木上或屋之下外作固如三四斗許小者亦一二斗中有窠如瓠之狀由此得名蜂色赤黃其形大於諸蜂世謂之玄瓠蜂蜀本圖經言十一月十二月採者應避生息之時也今人用露蜂房兼用此兩種樗雞東西京界尤多形類蠶蛾但頭足微黑翅兩重外一重灰色下一重深紅五色皆具腹大此即樗雞也今人又用之行瘀血月閉蚱蟬夏月身與聲皆大者是始終一般聲仍皆乘昏夜方出土中升高處背殼坼蟬出所以皆夜出者一以畏人二畏日炙干其殼而不能蛻也至時寒則墜地小兒蓄之雖數日亦不須食古人以謂飲風露信有之蓋不糞而溺亦可見矣西川有蟬花乃是蟬在殼中不出而化為花自項中出又殼治目昏翳又水煎殼汁治小兒出瘡疹不快甚良白殭蠶然蠶有兩三番惟頭番殭蠶最佳大而無蛆治小兒驚風白殭蠶蠍梢等分天雄尖附子尖共一錢微炮過為細末每服一字或半錢以生薑溫水調灌之其蠶蛾則第二番者以其敏於生育木虻大小有三種蜚虻今人多用之大如蜜蜂腹凹扁微黃緑色雄霸州順安軍沿塘濼界河甚多以其惟食牛馬等血故治瘀血血閉蟅蟲今人謂之簸箕蟲為其像形也乳脈不行研一枚水半合濾清服勿使服藥人知蠐螬此蟲諸腐木根下有之構木津甘故根下多有此蟲其木身未有完者亦有生於糞土中者雖肥大但腹中黑不若木中者雖瘦而稍白生研水絞汁濾清飲下奶蛞蝓蝸牛蛞蝓蝸牛二物矣蛞蝓其身肉只一段蝸牛背上別有肉以負殼行顯然異矣若為一物經中焉得分為二條也其治療亦大同小異故知別類又謂蛞蝓是蝸牛之老者甚無謂蛞蝓有二角蝸牛四角兼背有附殼肉豈得為一物也水蛭陳藏器日華子所説備矣大者京師又謂之馬鱉腹黃者謂之馬黃畏鹽然治傷折有功經與注皆不言修制宜子細不可忽也今人用者皆炒鱉甲九肋者佳煮熟者不如生得者仍以釅醋炙黃色用經中不言治勞惟蜀本藥性論云治勞瘦除骨熱後人遂用之然甚有據亦不可過劑頭血塗脫肛又燒頭灰亦治烏賊魚烏賊魚乾置四方人炙食之多取骨鏤為細研細水飛澄下比去水日乾之熟蜜和得所點目中翳緩取效蟹伊洛絶少今多自京師來京師亦自河北置之今河北沿邊滄瀛州等處所出甚多徐州亦有但不及河北者小兒解顱以螯並白芨爛搗塗囟上顱合此物極動風體有風疾人不可食屢見其事河北人取之當八九月蟹浪之時直於塘濼岸上伺其出水而拾之又夜則以燈火照捕始得之時黃與白滿殼凡收藏十數日不死亦不食此物每至夏末秋初則如蟬蛻解當日名蟹之意必取此義原蠶蛾有原復敏速之義此則第二番蛾也白殭蠶條中已具屎飼牛代谷又以三升醇酒拌蠶屎五斗用甑蒸熱於暖室中鋪於油單上令患風冷氣閉及近感癱風人就所患一邊臥著溫熱厚蓋覆汗出為度若虛人須常在左右防大熱昏冒仍令頭面在外不得壅覆未全愈間再作蠶蛻治婦人血風此則眠起時所蛻皮是也其蠶退紙謂之蠶連亦燒灰用之治婦人血露鰻鱺魚生剖曬乾取少許火上微炙候油出塗白剝用以指擦之即時色轉凡如此五七次用即愈仍先於白處微微擦動鮫魚鮫魚沙魚皮一等形稍異今人取皮飾鞍劍余如經河豚河豚經言無毒此魚實有大毒味雖珍然修治不如法食之殺人不可不謹也厚生者不食亦好蘇子美云河豚於此時貴不數魚蝦此時詩家鄙諷之言未足全信也然此物多怒觸之則怒氣滿腹翻浮水上漁人就以物撩之遂為人獲橄欖並蘆根汁解其毒紫貝紫貝大二三寸背上深紫有點但黑本經以此燒存性入點眼藥鱸魚鱸益肝腎補五臟和腸胃食之宜人不甚發病宜乎張翰思之也蝦麻多在人家渠塹下大腹品類中最大者是遇陰雨或昏夜即出食取眉間有白汁謂之蟾酥以油單裹眉裂之酥出單上入藥用有人病齒縫中血出以紙紝子蘸乾蟾酥少許於血出處按之立止世有人收三足枯蟾以罔衆但以水沃半日盡見其偽蓋本無三足者蛙蛙其色青腹細嘴尖後腳長故善躍大其聲則曰蛙小其聲則曰蛤月令所謂雀入大水化為蛤者也唐韓退之詩一夜青蛙啼到曉者是此食之性平解勞熱蛤蚧補肺虛勞嗽有功治久嗽不愈肺間積虛熱久則成瘡故嗽出膿血曉夕不止喉中氣塞胸膈噎痛蛤蚧阿膠生犀角鹿角膠羚羊角各一兩除膠外皆為屑次入膠分四服每服用河水三升於銀石器中慢火煮至半升濾去滓臨臥微溫細細呷其滓候服盡再捶都作一服以水三升煎至升斤如前服若病人久虛不喜水當遞減水張刑部子皋病極由樞密況送此方遂愈鯪鯉甲穴山而居亦能水燒一兩存性肉豆蔻仁三個同為末米飲調二錢服治氣痔膿血甚者加蝟皮一兩燒入中病即已不必盡劑蜘蛛蜘蛛品亦多皆有毒經不言用是何種今人多用人家簷角籬頭陋巷之間空中作圓網大腹深灰色者遺尿著人作瘡癬蜻蛉其中一種最大京師名為馬大頭者是身緑色雌者腰間一遭碧色用則當用雄者陶隱居以謂青色大眼一類之中元無青者眼一類皆大此物生化於水中故多飛水上唐杜甫云點水蜻蜓款款飛石蠶謂之為草則繆矣經言肉解結氣注中更辨不定此物在處有附生水中石上作絲繭如叉股長寸許以蔽其身色如泥蠶在其中此所以謂之石蠶也今方家用者絶稀此亦水中蟲耳山河中多蛇蛻蛇蛻從口翻退出眼睛亦退今閣眼藥多用取此義也入藥洗淨蛇黃椎破中間有如自然銅者佳治心悸動火燒赤酒淬至酥二兩硃砂一兩與蛇黃同研水飛天麻二兩別為末與前二味合勻每以半錢少以薄菏湯調食後夜臥服殊效金蛇金蛇今方書往往不見用烏蛇尾細長能穿小銅錢一百文者佳有身長一丈餘者蛇類中此蛇入藥最多嘗於順安軍塘濼堤上見一烏蛇長一丈餘有鼠狼齧蛇頭曳之而去是亦相畏伏爾市者多偽以他蛇燻黑色貨之不可不察也烏蛇脊高世謂之劍脊烏梢白花蛇諸蛇鼻向下獨此蛇鼻向上背有方勝花紋以此得名用之去頭尾換酒浸三日棄酒不用火炙仍盡去皮骨此物毒甚不可不防也蜈蚣背光黑緑色足赤腹下黃有中其毒者以烏雞屎水稠調塗咬處效大蒜塗之亦效復能治丹毒瘤蜈蚣一條幹者白礬皂子大雷丸一個百步二錢稱同為末醋調塗之又畏蛞蝓不敢過所行之路觸其身則蜈蚣死人故取以治蜈蚣毒桑汁白鹽亦效馬陸即今百節蟲也身如槎節節有細蹙紋起紫黑色光潤百足死則側臥如環長二三寸尤者粗如小指西京上陽宮及內城磚牆中甚多入藥至鮮蠮噎螉烏紅蠮螉諸家所論備矣然終不敢舍詩之意嘗析窠而視之果有子如半粟米大其色白而微黃所負蟲亦在其中乃青菜蟲卻在子下不與蟲相著又非葉蟲及草上青蟲應是諸蟲皆可也陶隱居所説近之矣人取此房研細醋調塗蜂蠆雀甕多在棘枝上故又名棘剛子研其間蟲汁灌小兒治原缺鼠婦鼠婦此濕生蟲也多足其色如蚓背有橫紋蹙起大者長三四分在處有之磚瓷及下濕處多用處絶少螢常在大暑前後飛出是得大火之氣而化故如此明照也今人用者少月令雖曰腐草所化然非陰濕處終無衣魚多在故書中久不動帛中或有之不若故紙中多也身有厚粉手搐之則落亦齧毳衣用處亦少其形稍似魚其尾又分二歧世用以滅瘢痕白頸蚯蚓自死者良然亦應候而鳴此物有毒昔有病腹大夜間蚯蚓鳴於身有人教用鹽水浸之而愈崇寧末年隴州兵士暑月中在倅廳前跣立廳下為蚯蚓所中遂不救後數日又有人被其毒博識者教以先飲鹽湯一杯次以鹽湯浸足乃愈今入藥當去土了微炙若治腎臟風下疰病不可闕也仍須鹽湯送王荊公所謂藁壤太牢俱有味可能蚯蚓獨清廉者也螻蛄此蟲當立夏後至夜則鳴月令謂之螻蟈鳴者是矣其聲如蚯蚓此乃是五技而無一長者蜣螂大小二種一種大者為胡蜣螂身黑光腹翼下有小黃子附母而飛行晝不出夜方飛出至人家庭戶中見燈光則來一種小者身黑暗晝方飛出夜不出今當用胡蜣螂其小者研三十枚以水灌牛馬治脹結絶佳狐遇而必盡食之斑蝥須糯米中炒米黃為度妊身人不可服為能潰人肉治淋藥多用極苦人尤宜斟酌下條芫青其用與此不相遠故附於此馬刀京師謂之𤊿岸春夏人多食然發風痰性微冷又順安軍界河中亦出螊大抵與馬刀相類肉頗淡人作鮓以寄鄰左又不能致遠亦發風此等皆不可多食今蛤粉皆此等衆蛤灰也貝子今謂之貝齒亦如紫貝但長寸余故曰貝子色微白有深紫黑者治目中翳燒用北人用之氈帽上為飾及綴衣或作蹀躞下垂甲香甲香善能管香煙與沉檀龍麝用之甚佳蠍大人小兒通用治小兒驚風不可闕也有用全者有隻用梢者梢力尤功今青州山中石下捕得慢火逼或烈日中曬蠍渴熱時乃與青泥食之既滿復以火逼殺之故其色多赤欲其體重而售之故也醫家用之皆悉去土如蠆人還能禁止之自嘗被其毒兄長禁而止及令故蜇終不痛翰林禁科具矣五靈脂行經血有功不能生血嘗有人病眼中翳往來不定如此乃是血所病也蓋心生血肝藏血肝受血則能視目病不治血為背理此物入肝最速一法五靈脂二兩沒藥一兩乳香半兩川烏頭一兩半炮去皮同為末滴水丸如彈子大每用一丸生薑溫酒磨服治風冷氣血閉手足身體疼痛冷麻又有人被毒蛇所傷良久之間已昏困有老僧以酒調藥二錢灌之遂蘇及以藥滓塗咬處良久復灌二錢其苦皆去問之乃五靈脂一兩雄黃半兩同為末只此耳後有中毒者用之無不驗此藥雖不甚貴然亦多有偽者
