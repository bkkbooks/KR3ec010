body:
  text: 卷三序例下治婦人雖有別科然亦有不能盡聖人之法者今豪足之家居奧室之中處幃幔之內復以帛懞手臂既不能行望色之神又不能殫切脈之巧四者有二闕焉黃帝有言曰凡治病察其形氣色澤形氣相得謂之可治色澤以浮謂之易已形氣相失謂之難治色夭不澤謂之難已又曰診病之道觀人勇怯骨肉皮膚能知其情以為診法若患人脈病不相應既不得見其形醫人只據脈供藥其可得乎如此言之不能盡其術也此醫家之公患世不能革醫者不免盡理質問病家見所問繁不為醫業不精往往得藥不肯服似此甚多扁鵲見齊侯之色尚不肯信況其不得見者乎嗚呼可謂難也已又婦人病溫已十二日診之其脈六七至而澀寸稍大尺稍小發寒熱頰赤口乾不了了耳聾問之病後數日經水乃行此屬少陽熱入血室也若治不對病則必死乃按其證與小柴胡湯服之二日又與小柴胡湯加桂枝幹薑湯一日寒熱雖已又云我臍下急痛又與抵當丸微利臍下痛痊身漸涼和脈漸勻尚不了了乃復與小柴胡次日云我但胸中熱燥口鼻乾又少與調胃承氣湯不得利次日又云心下痛又與大陷胸丸半服利三行而次日虛煩不寧時妄有所見時復狂言雖知其尚有燥屎以其極虛不敢攻之遂與竹葉湯去其煩熱其夜大便自通至曉兩次中有燥屎數枚而狂言虛煩盡解但咳嗽唾沫此肺虛也若不治恐乘虛而成肺痿遂與小柴胡去人參大棗生薑加乾薑五味子湯一日咳減二日而病悉愈以上皆用張仲景方有婦人病吐逆大小便不通煩亂四肢冷漸無脈凡一日半與大承氣湯兩劑至夜半漸得大便通脈漸生翌日乃安此關格之病極難治醫者當審謹也經曰關則吐逆格則不得小便如此亦有不得大便者有小兒病虛滑食略化大便日十餘次四肢柴瘦腹大食訖又飢此疾正是大腸移熱於胃善食而瘦又謂之食㑊者時五六月間脈洪大按之則絶今六脈既單洪則夏之氣獨然按之絶則無胃氣也經曰夏脈洪洪多胃氣少曰病但洪無胃氣曰死夏以胃氣為本治療失於過時後不逾旬果卒有人病久嗽肺虛生寒熱以款冬花焚三兩俟煙出以筆管吸其煙滿口則咽之至倦則已凡數日之間五七作瘥有人病瘧月餘日又以藥吐下之氣遂弱疾未愈觀其病與脈乃夏傷暑秋又傷風乃與柴胡湯一劑安後又飲食不節寒熱夏作此蓋前以傷暑今以飲食不謹遂致吐逆不食脅下牽急而痛寒熱無時病名痰瘧以十棗湯一服下痰水數升明日又與理中散二錢遂愈有人苦風痰頭痛顫掉吐逆飲食減醫以為傷冷物遂以藥溫之不愈又以丸藥下之遂厥復與金液丹後譫語吐逆顫掉不省人狂若見鬼循衣摸床手足冷脈伏此胃中有結熱故昏瞀不省人以陽氣不能布於外陰氣不持於內即顫掉而厥遂與大承氣湯至一劑乃愈方見仲景後服金箔丸方見刪繁有男子年六十一腳腫生瘡忽食豬肉不安醫以藥利之稍愈時出外中風汗出後頭面暴腫起紫黑色多睡耳輪上有浮泡小瘡黃汁出乃與小續命湯中加羌活一倍服之遂愈有人年五十四素羸多中寒近服菟絲有效小年常服生硫黃數斤脈左上二部上下二部弦緊有力五七年來病右手足筋急拘攣言語稍遲遂與仲景小續命湯加薏苡仁一兩以治筋急減黃芩人參芍藥各半以避中寒杏仁只用一百五枚後云尚覺大冷因令盡去人參芍藥黃芩三物卻加當歸一兩半遂安今人用小續命湯者比比皆是既不能逐證加減遂至危殆人亦不知今小續命湯世所須也故舉以為例可不謹哉夫八節之正氣生活人者也八節之虛邪殺人者也非正氣則為邪非真實則為虛所謂正氣者春溫夏熱秋涼冬寒此天之氣也若春在經絡夏在肌肉秋在皮膚冬在骨髓此人之氣也在處為實不在處為虛故曰若以身之虛逢時之虛邪不正之氣兩虛相感始以皮膚經絡次傳至臟腑逮於骨髓則藥力難及矣如此則醫家治病正宜用藥抵截散補防其深固而不可救也又嘗須保護胃氣舉斯為例余可仿此
