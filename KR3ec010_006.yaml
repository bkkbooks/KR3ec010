body:
  text: 卷六青琅玕書曰三危既宅三危西裔之山也厥貢惟球琳琅玕孔穎達以謂琅玕石似玉新書亦謂三苗西戎西域記云天竺國正出此物陶隱居謂為本名大丹石既是大丹石則本經豈可更言煮煉服之又曰可化為丹陶不合遠引非此琅玕也唐本注云是琉璃之類且琉璃火成之物琅玕又非火成經曰生蜀郡平澤安得同類言之其說愈遠且佛經所謂琉璃者正如鬼谷珠之礜乃火成之物也今人絶不見用礜石特生礜石博物志及陶隱居皆言此二石鸛取之以壅卵如此則是一物也隱居又言仙經不云特生則只是前白礜石今補注但隨文解義不見特生之意蓋二條只是一物但以特生不特生為異耳所謂特生者不附著他石為特耳今用者絶少惟兩字礜石入藥然極須謹用其毒至甚及至論鸛巢中者又卻從謬說鸛巢中皆無此石乃曰鸛常入水冷故取以壅卵如此則鸕鷀雁鶩之類皆食於水亦自繁息生化復不用此二石其說往往取俗士之言未嘗究其實而窮其理也嘗官於順安軍親檢鸛巢率無石矧礜石焉得處處有之然治久積及久病胸腹冷有功直須謹用蓋其毒不可當代赭方士爐火中多用丁頭光澤堅實赤紫色者佳白堊即白善土京師謂之白土子方寸許切成段鬻於市人得以浣衣今人合王瓜等分為末湯點二錢服治頭痛赤土今公府用以飾椽柱者水調細末一二錢服以治風疹大鹽新者不苦久則鹹苦今解州鹽池所出者皆成斗子其形大小不等久亦苦海水煎成者但味和二鹽互有得失入藥及金銀作多用大鹽及解鹽傍海之人多黑色蓋日食魚鹽此走血之驗也齒縫中血出鹽湯嗽之及接藥入腎北虜以鹽淹尸使不腐戎鹽戎鹽成垛裁之如枕細白味甘鹹亦功在卻血入腎治目中瘀赤澀昏鉛丹本謂之黃丹化鉛而成別有法唐本注炒錫作然經稱鉛丹則炒錫之說誤矣亦不為難辨蓋錫則色黯暗鉛則明白以此為異治瘧及久積皆用粉錫粉錫胡粉也又名定粉止泄痢積聚及久痢鉛霜鉛霜圖經已著其法治上膈熱涎塞塗木瓜失酸味金剋木也古文錢古銅焦赤有毒治目中瘴瘀腐蝕壞肉婦人橫逆産五淋多用非特為有錫也此說非是今但取景王時大泉五十及寶貨秦半兩漢莢錢大小五銖吳大泉五百大泉當千宋四銖二銖及梁四柱北齊常平五銖爾後其品尚多如此之類方可用少時常自患暴赤目腫痛數日不能開有客教以生薑一塊洗淨去皮以古青銅錢刮取薑汁就錢稜上點初甚苦熱淚蔑面然終無損後有患者教如此點往往疑惑信士點之無不獲驗一點遂愈更不可再作有瘡者不可用金牙今方家絶不用以此故商客無利不販賣醫者由是委而不用兼所出惟蜀郡有之蓋亦不廣也余如經石灰水調一盞如稠粥揀好糯米粒全者半置灰中半灰外經宿灰中米色變如水精若人手面上有黑黶子及紋刺先微微以針頭撥動置少許如水精者於其上經半日許黶汁自出剔去藥不用且不得著水三二日愈又取新硬石灰一合以醋炒調如泥於患偏風牽口喎邪人口唇上不患處一邊塗之立便牽正冬灰諸家只解灰而不解冬亦其闕也諸灰一烘而成惟冬灰則經三四月方徹爐灰既曉夕燒灼其力得不全燥烈乎而又體益重今一爇而成者體輕蓋火力劣故不及冬灰耳若古緊面少容方中用九燒益母灰蓋取此義如或諸方中用桑灰自合依本法既用冬灰則須爾唐本注云冬灰本是藜灰未知別有何說又湯火灼以餅爐中灰細羅脂麻油調羽掃不得著水仍避風伏龍肝婦人血露蠶沙一兩炒伏龍肝半兩阿膠一兩同為末溫酒調空肚服二三錢以知為度本條中有東壁土陳藏器云取其東壁土久干也今詳之南壁土亦向陽久干也何不取蓋東壁常先得曉日烘炙日者太陽真火故治瘟瘧或曰何不取午盛之時南壁土而取日初出東壁土者何也火生之時其氣壯故素問云少火之氣壯及其當午之時則壯火之氣衰故不取實用此義或曰何以知日者太陽真火以水精珠或心凹銅鑑向日射之以艾承接其光聚處火出故知之半天河水半天河水一水也然用水之義有數種種各有理如半天河水在上天澤水也故治心病鬼疰狂邪氣惡毒臘雪水大寒水也故解一切毒治天行時氣溫疫熱癇丹石發酒後暴熱黃疸井華水清冷澄徹水也故通九竅洗目膚翳及酒後熱痢後世又用東流水者取其快順疾速通關下膈也倒流水取其回旋留止上而不下也菊花水本條見南陽酈縣北潭水其源悉芳菊生被崖水為菊味此說甚怪且菊生於浮土上根深者不過尺百花之中此特淺露水泉莫非深遠而來況菊根亦無香其花當九月十月間只三兩旬中焉得香入水也若因花而香其無花之月合如何也殊不詳水自有甘淡咸苦焉知無有菊味者嘗官於永耀間沿干至洪門北山下古石渠中泉水清徹衆官酌而飲其味與惠山泉水等亦微香世皆未知之烹茶尤相宜由是知泉脈如此非緣浮土上所生菊能變泉味博識之士宜細詳之漿水漿水不可同李實飲令人霍亂吐利熱湯助陽氣行經絡患風冷氣痹人多以湯泄腳至膝上厚覆使汗出周身然別有藥亦終假湯氣而行也四時暴泄利四肢冷臍腹疼深湯中坐浸至腹上頻頻作生陽佐藥無速於此虛寒人始坐湯中必戰仍常令人伺守硇砂金銀有僞投熔鍋中其僞物盡消散矧人腹中有久積故可潰腐也合他藥治目中翳用之須水飛過入瓷器中於重湯中煮其器使自干殺其毒及去其塵穢蓬砂含化咽津治喉中腫痛膈上痰熱初覺便治不能成喉痹亦緩取效可也南番者色重褐其味和其效速西戎者其色白其味焦其功緩亦不堪作焊姜石姜石所在皆有須不見日色旋取微白者佳治疔腫殊效自然銅有人飼折翅雁後遂飛去今人打撲損研極細水飛過同當歸沒藥各半錢以酒調頻服仍以手摩痛處石燕今人用者如蜆蛤之狀色如土堅重則石也既無羽翼焉能自石穴中飛出何故只墮沙灘上此說近妄唐本注永州土岡上掘深丈餘取之形似坩而小重如石則此自是一物余說不可取潰虛積藥中多用砒霜瘧家或用才過劑則吐瀉兼作須濃研緑豆汁仍兼冷水飲得石腦油即伏今信州鑿坑井下取之其坑常封鎖坑中有濁緑水先絞水盡然後下鑿取生砒謂之砒黃其色如牛肉或有淡白路謂石非石謂土非土磨研酒飲治癖積氣有功才見火便有毒不可造次服也取砒之法將生砒就置火上以器覆之令砒煙上飛著覆器遂凝結纍然下垂如乳尖長者為勝平短者次之圖經言大塊者其大塊者已是下等片如細屑者極下也入藥當用如乳尖長者直須詳謹浮石水飛治目中翳今皮作家用之磨皮上垢無出此石石蟹條中雲浮石平無毒止渴治淋殺野獸毒合於此條收入金星石銀星石治大風疾別有法須燒用金星石於蒼石內外有金色麩片銀星石有如銀色麩片又一種深青色堅潤中有金色如麩片不入藥工人碾為器或婦人首飾余如經石腦油真者難收多滲蝕器物今入藥最少燒煉或須也仍常用有油去聲器貯之又研生砒霜入石腦油再研如膏入鉗鍋子內用淨瓦片子蓋定置火上俟鍋子紅泣盡油出之又再研再入油再上火凡如此共兩次即砒霜伏
