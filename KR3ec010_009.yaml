body:
  text: 卷九當歸廣雅云山蘄古芹切當歸也似芹而粗大說文云蘄草也生山中者名薜音百新書圖經以謂當歸芹類也在平地者名芹生山中粗大者名當歸若然則今川蜀皆以平地作畦種尤肥好多脂肉不以平地山中為等差但肥潤不枯燥者佳今醫家用此一種為勝市人又以薄酒灑使肥潤不可不察也藥性論云補女子諸不足此說盡當歸之用矣芍藥芍藥全用根其品亦多須用花紅而單葉山中者為佳花葉多即根虛然其根多赤色其味澀苦或有色白粗肥者益好余如經然血虛寒人禁此一物古人有言曰減芍藥以避中寒誠不可忽生薑治暴逆氣嚼三兩皂子大下咽定屢服屢定初得寒熱痰嗽燒一塊冷齧之終日間嗽自愈暴赤眼無瘡者以古銅錢刮淨姜上取汁於錢唇點目熱淚出今日點來日愈但小兒甚懼不須疑已試良驗麻黃出鄭州者佳剪去節半兩以蜜一匙匕同炒良久以水半升煎俟沸去上沫再煎去三分之一不用滓病瘡疱倒黶黑者乘熱盡服之避風伺其瘡復出一法用無灰酒煎但小兒不能飲酒者難服然其效更速以此知此藥入表也葛根澧鼎之間冬月取生葛以水中揉出粉澄成垛先煎湯使沸後擘成塊下湯中良久色如膠其體甚韌以蜜湯中拌食之擦少生薑尤佳大治中熱酒渴病多食行小便亦能使人利病酒及渴者得之甚良彼之人又切入煮茶中以待賓但甘而無益又將生葛根煮熟者作果賣虔吉州南安軍亦如此賣栝樓實九月十月間取穰以乾葛粉拌焙乾銀石器中熳火炒熟為末食後夜臥以沸湯點一二錢服治肺燥熱渴大腸秘其根與貝母知母秦艽黃芩之類皆治馬熱苦參有朝士苦腰重久坐旅拒十餘步然後能行有一將佐謂朝士曰見公日逐以藥揩齒得無用苦參否曰始以病齒用苦參已數年此病由苦參入齒其氣味傷腎故使人腰重後有太常少卿舒昭亮用苦參揩齒歲久亦病腰自後悉不用腰疾皆愈此皆方書舊不載者有人病遍身風熱細疹癢痛不可任連胸頸臍腹及近隱處皆然涎痰亦多夜不得睡以苦參末一兩皂角二兩水一升揉濾取汁銀石器熬成膏和苦參末為丸如梧桐子大食後溫水服二十至三十丸次日便愈石龍芮今有兩種水中生者葉光而末圓陸生者葉有毛而末銳入藥須生水者陸生者又謂之天灸取少葉揉係臂上一夜作大泡如火燒者是惟陸生者補陰不足莖常冷失精余如經瞿麥八政散用瞿麥今人為至要藥若心經雖有熱而小腸虛者服之則心熱未退而小腸別作病矣料其意者不過為心與小腸為傳送故用此入小腸藥按經瞿麥並不治心熱若心無大熱則當只治其心若或制之不盡須當求其屬以衰之用八政散者其意如此白芷白芷𦯓是也出吳地者良經曰能蝕膿今人用治帶下腸有敗膿淋露不已腥穢殊甚遂至臍腹更增冷痛此蓋為敗膿血所致卒無已期須以此排膿白芷一兩單葉紅蜀葵根二兩芍藥根白者白礬各半兩礬燒枯別研余為末同以蠟丸如梧子大空肚及飯前米飲下十丸或十五丸俟膿盡仍別以他藥補之杜蘅用根似細辛但根色白葉如馬蹄之下市者往往亂細辛須如此別之爾雅以謂似葵而香是也將杜蘅與細辛相對便見真偽況細辛惟出華州者良杜蘅其色黃白拳局而脆干則作團紫菀紫菀用根其根柔細紫色益肺氣經具言之唐本注言無紫菀時亦用白菀白菀即女菀也今本草無白菀之名蓋唐修本草時已刪去百合張仲景用治傷寒壞後百合病須此也莖高三尺許葉如大柳葉四向攢枝而上其顛即有淡黃白花四垂向下覆長蕊花心有檀色每一枝顛須五六花子紫色圓如梧子生於枝葉間每葉一子不在花中此又異也根即百合其色白其形如松子殼四向攢生中間出苗酸漿今天下皆有之苗如天茄子開小白花結青殼熟則深紅殼中子大如櫻亦紅色櫻中復有細子如落蘇之子食之有青草氣此即苦耽也今圖經又立苦耽條顯然重複本經無苦耽蠡實陶隱居云方藥不復用俗無識者本經諸家所注不相應若果是馬藺則日華子不當更言亦可為蔬菜食蓋馬藺其葉馬牛皆不食為才出土葉已硬況又無味豈可更堪人食也今不敢以蠡實為馬藺子更俟博識者石香葇石香葇處處有之不必山岩石縫中但山中臨水附崖處或有之九月十月尚有花
