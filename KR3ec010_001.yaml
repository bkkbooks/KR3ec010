body:
  text: 卷一通直郎添差充收買藥材所辨驗藥材寇宗奭編撰序例上衍義總敘天地以生成為德有生所甚重者身也身以安樂為本安樂所可致者以保養為本世之人必本其本則本必固本既固疾病何由而生夭橫何由而至此攝生之道無逮於此夫草木無知猶假灌溉矧人為萬物之靈豈不資以保養然保養之義其理萬計約而言之其術有三一養神二惜氣三堤疾忘情去智恬淡虛無離事全真內外無寄如是則神不內耗境不外惑真一不雜則神自寧矣此養神也抱一元之本根固歸精之真氣三焦定位六賊忘形識界既空大同斯契則氣自定矣此惜氣也飲食適時溫涼合度出處無犯於八邪寤寐不可以勉強則身自安矣此堤疾也三者甚易行然人自以謂難行而不肯行如此難有長生之法人罕敦尚遂至永謝是以疾病交攻天和頓失聖人憫之故假以保救之術輔以蠲疴之藥俾有識無識咸臻壽域所以國家編撰聖惠校正素問重定本草別為圖經至於張仲景傷寒論及千金金匱外臺之類粲然列於書府今夏考拾天下醫生補以名職分隸曹屬普救世人之疾苦茲蓋全聖至德之君合天地之至仁接物厚生大賚天下故野無遺逸之藥世無不識之病然本草二部其間撰著之人或執用己私失於商較致使學者檢據之間不得無惑今則並考諸家之説參之實事有未盡厥理者衍之以臻其理如東壁土倒流水冬灰之類隱避不斷者伸之以見其情如水自菊下過而水香鼴鼠溺精墜地而生子文簡誤脫者證之以明其義如玉泉石蜜之類諱避而易名者原之以存其名如山藥避本朝諱及唐避代宗諱使是非歸一治療有源檢用之際曉然無惑是以搜求訪緝者十有餘年採拾衆善診療疾苦和合收蓄之功率皆周盡矧疾為聖人所謹無常不可以為醫豈容易言哉宗奭常謂疾病所可憑者醫醫可據者方也方可恃者藥也苟知病之虛實方之可否若不能達藥性之良毒辨方宜之早晚真偽相亂新陳相錯則曷由去道人陳宿之蠱唐甄立言仕為太常丞善醫術有道人心腹悶煩彌二歲診曰腹有蠱誤食發而然令餌雄黃一劑少選吐一蛇如拇無目燒之有發氣乃愈生張果駢潔之齒唐張果詔見元宗謂高力士曰吾聞飲堇無苦者奇士也時天寒取以飲果三進頽然曰非桂酒乃寢頃視齒焦縮顧左上取鐵如意擊墮之藏帶中更出藥傅其齦良久齒已生粲然駢潔帝益神之此書之意於是乎作今則編次成書謹依二經類例分門條析仍衍序例為三卷內有名未用及意義已盡者更不編入其神農本經名醫別録唐本先附今附新補新定之目緣本經已著目録內更不聲説依舊作二十卷及目録一卷目之曰本草衍義若博愛衛生之士志意或同則更為詮修以稱聖朝好生之德時政和六年丙申歲記本草之名自黃帝岐伯始其補注總敘言舊説本草經者神農之所作而不經平帝紀元始五年舉天下通知方術本草者所在軺傳遣詣京師此但見本草之名終不能斷自何代而作又樓護傳稱護少誦醫經本草方術數十萬言本草之名蓋見於此是尤不然也世本曰神農嘗百草以和藥濟人然亦不著本草之名皆未臻厥理嘗讀帝王世紀曰黃帝使岐伯嘗味草木定本草經造醫方以療衆疾則知本草之名自黃帝岐伯始其淮南子之言神農嘗百草之滋味一日七十毒亦無本草之説是知此書乃上古聖賢具生知之智故能辨天下品物之性味合世人疾病之所宜後之賢智之士從而和之者又增廣其品至一千八十二名補注本草稱一千八十二種然一種有分兩用者有三用者其種字為名字於義方允可謂大備然其間注説不盡或舍理別趣者往往多矣是以衍托余義期於必當非足以發明聖賢之意冀有補於闕疑夫天地既判生萬物者惟五氣爾五氣定位則五味生五味生則千變萬化至於不可窮已故曰生物者氣也成之者味也以奇生則成而偶以偶生則成而奇寒氣堅故其味可用以軟熱氣軟故其味可用以堅風氣散故其味可用以收燥氣收故其味可用以散土者沖氣之所生沖氣則無所不和故其味可用以緩氣堅則壯故苦可以養氣脈軟則和故咸可以養脈骨收則強故酸可以養骨筋散則不攣故辛可以養筋肉緩則不壅故甘可以養肉堅之而後可以軟收之而後可以散欲緩則用甘不欲則弗用用之不可太過太過亦病矣古之養生治疾者必先通乎此不通乎此而能已人之疾者蓋寡矣夫安樂之道在能保養者得之況招來和氣之藥少攻決之藥多不可不察也是知人之生須假保養無犯和氣以資生命才失將護便致病生苟或處治乖方旋見顛越防患須在間日故曰安不忘危存不忘亡此聖人之預戒也攝養之道莫若守中守中則無過寫不及之害經曰春秋冬夏四時陰陽生病起於過用蓋不適其性而強去為逐強處即病生五臟受氣蓋有常分用之過耗是以病生善養生者既無過耗之弊又能保守真元何患乎外邪所中也故善服藥不若善保養不善保養不若善服藥世有不善保養又不善服藥倉猝病生而歸咎於神天噫是亦未嘗思也可不謹歟夫未聞道者放逸其心逆於生藥以精神徇智巧以憂畏徇得失以勞苦徇禮節以身世徇財利四徇不置心為之病矣極力勞形噪暴氣逆當風縱酒食嗜辛鹹肝為之病矣飲食生冷溫涼失度久坐久臥大飽大飢脾為之病矣呼叫過常辨爭陪答冒犯寒暄恣食鹹苦肺為之病矣久坐濕地強力入水縱欲勞形三田漏溢腎為之病矣五病既作故未老而羸未羸而病病至則重重則必斃嗚呼是皆弗思而自取之也衛生之士須謹此五者可致終身無苦經曰不治已病治未病正為此矣夫善養生者養內不善養生者養外養外者實外以充快悅澤貪欲恣情為務殊不知外實則內虛也善養內者實內使臟腑安和三焦各守其位飲食常適其宜故莊周曰人之可畏者衽席飲食之間而不知為之戒者過也若能常如是畏謹疾病何緣而起壽考焉不得長賢者造形而悟愚者臨病不知誠可畏也夫柔情難綰而不斷不可不以智慧決也故幃箔不可不遠斯言至近易其事至難行蓋人之智慧淺陋不能勝其貪欲也故佛書曰諸苦所因貪欲為本若滅貪欲何所依止是知貪欲不滅苦亦不滅貪欲滅苦亦滅聖人言近而指遠不可不思不可不懼善攝生者不勞神不苦形神形既安禍患何由而致也夫人之生以氣血為本人之病未有不先傷其氣血者世有童男室女積想在心思慮過當多致勞損男則視色先散女則月水先閉何以致然蓋愁憂思慮則傷心心傷血逆竭則血逆竭故神色先散而月水先閉也火既受病不能榮養其子故不嗜食脾既虛則金氣虧故發嗽嗽既作水氣絶故四肢干木氣不充故多怒鬢髮焦筋痿俟五臟傳遍故卒不能死然終死矣此一種於諸勞中最為難治蓋病起於五臟之中無有已期藥力不可及也若或自能改易心志用藥扶接如此則可得九死一生舉此為例其餘諸勞可按脈與證而治之夫治病有八要八要不審病不能去非病不去無可去之術也故須審辨八要庶不違誤其一曰虛五虛是也脈細皮寒氣少泄痢前後瞀食不入此為五虛二曰實五實是也脈盛皮熱腹脹前後不通悶瞀此五實也三曰冷臟腑受其積冷是也四曰熱臟腑受其積熱是也五曰邪非臟腑正病也六曰正非外邪所中也七曰內病不在外也八曰外病不在內也既先審此八要參知六脈審度所起之源繼以望聞問切加諸病者未有不可治之疾也夫不可治者有六失失於不審失於不信失於過時失於不擇醫失於不識病失於不知藥六失之中有一於此即為難治非只醫家之罪亦病家之罪也矧又醫不慈仁病者猜鄙二理交馳於病何益由是言之醫者不可不慈仁不慈仁則招禍病者不可猜鄙猜鄙則招禍惟賢者洞達物情各就安藥亦治病之一説耳合藥分劑料理法則中言凡方云用桂一尺者削去皮畢重半兩為正既言廣而不言狹如何便以半兩為正且桂即皮也若言削去皮畢即是全無桂也今定長一尺闊一寸削去皮上粗虛無味者約為半兩然終不見當日用桂一尺之本意亦前人之失也序例藥有酸咸甘苦辛五味寒熱溫涼四氣今詳之凡稱氣者即是香臭之氣其寒熱溫涼則是藥之性且如鵝條中雲白鵝脂性冷不可言其氣冷也況自有藥性論其四氣則是香臭臊腥故不可以寒熱溫涼配之如蒜阿魏鮑魚汗襪則其氣臭雞魚鴨蛇則其氣腥腎狐貍白馬莖褌近隱處人中白則其氣臊沉檀龍麝則其氣香如此則方可以氣言之其序例中氣字恐後世誤書當改為性字則於義方允今人用巴豆皆去油訖生用茲必為本經言生溫熟寒故欲避寒而即溫也不知寒不足避當避其大毒矧本經全無去油之説故陶隱居云熬令黃黑然亦太過矣日華子云炒不如去心膜煮五度換水各煮一沸為佳其杏仁桃仁葶藶胡麻亦不須熬至黑但慢火炒令赤黃色斯可矣凡服藥多少雖有所説一物一毒服一丸如細麻之例今更合別論緣人氣有虛實年有老少病有新久藥有多毒少毒更在逐事斟量不可舉此為例但古人凡設例者皆是假令豈可執以為定法本草第一序例言犀角羚羊角鹿角一概末如粉臨服內湯中然今昔藥法中有生磨者煎取汁者且如丸藥中用蠟取其能固護藥之氣味勢力全備以過關膈而作效也今若投之蜜相和雖易為丸劑然下咽亦易散化如何得到臟中若其間更有毒藥則便與人作病豈徒無益而又害之全非用蠟之本意至如桂心於得更有上虛軟甲錯處可削之也凡此之類亦更加詳究今人用麻黃皆合搗諸藥中張仲景方中皆言去上沫序例中言先別煮三兩沸掠去其沫更益水如本數乃納余藥不爾令人發煩甚得用麻黃之意醫家可持此説然云折去節令通理寸銼之不若碎銼如豆大為佳藥味易出而無遺力也陶隱居云藥有宣通補泄輕重澀滑燥濕此十種今詳之惟寒熱二種何獨見遺如寒可去熱大黃朴硝之屬是也如熱可去寒附子桂之屬是也今特補此二種以盡厥旨
