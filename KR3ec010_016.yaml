body:
  text: 卷十六發髲與亂髮自是兩等發髲味苦即陳舊經年歲者如橘皮皆橘也而取其陳者狼毒麻黃吳茱萸半夏枳實之類皆須陳者謂之六陳入藥更良敗蒲亦然此用髲之義耳今人又謂之頭髲其亂髮條中自無用髲之義此二義甚明亦不必如此過謂搜索右以亂髮如雞子大無油器中熬焦黑就研為末以好酒一盞沃之何首烏末二錢同勻攪候溫灌之下咽過一二刻再灌治破傷風及沐發中風極效人乳汁人乳汁治目之功多何也人心生血肝藏血肝受血則能視蓋水入於經則其血乃成又曰上則為乳汁下則為月水故知乳汁則血也用以點眼豈有不相宜者血為陰故其性冷藏寒人如乳餅酪之類不可多食雖曰牛羊乳然亦不出乎陰陽造化爾西戎更以駝馬乳為酥酪老人患口瘡不能食飲人熱乳良人屎用干陳者為末於陰地淨黃土中作五六寸小坑將末三兩匙於坑中以新汲水調勻良久俟澄清與時行大熱狂渴須水人飲之愈今世俗謂之地清然飲之勿極意恐過多耳又治一切癰癤熱毒腫膿血未潰疼痛不忍用乾末麝香各半錢同研細抄一豆大津唾貼瘡心醋面錢子貼定膿潰出去藥人溺須童男者産後溫一杯飲壓下敗血惡物有飲過七日者過多恐久遠血藏寒令人髮帶病氣血虛無熱者尤不宜多服此亦性寒故治熱勞方中亦用人指甲治鼻衄細細刮取俟血稍定去淤血於所衄鼻中搐之立愈獨不可備則衆人取之甚善衄藥並法最多或效或不效故須博採以備道途田野中用龍骨諸家之説紛然不一既不能指定終是臆度西京穎陽縣民家忽崖壞得龍骨一副肢體頭角悉具不知其蛻也其斃也若謂蛻斃則是有形之物而又生不可得見死方可見謂其化也則其形獨不能化然西域記中所説甚詳但未敢據憑萬物所稟各異造化不可盡知莫可得而詳矣孔子曰君子有所不知蓋闕如也妄亂穿鑿恐誤後學治精滑及大腸滑不可闕也牛黃牛黃亦有駱駝黃皆西戎所出也駱駝黃極易得醫家當審別考而用之為其形相亂也黃牛黃輕鬆自然微香以此為異蓋又有犛音貓牛黃堅而不香麝麝每糞時須聚於一所人見其所聚糞及有遺麝氣遂為人獲亦物之一病爾此獵人云余如經象牙取口兩邊各出一牙下垂夾鼻者非口內食齒齒別入藥今為象笏者是也醍醐作酪時上一重凝者為酪面酪面上其色如油者為醍醐熬之即出不可多得極甘美雖如此取之用處亦少惟潤養瘡痂最相宜犀角凡入藥須烏色未經湯水浸煮者故曰生犀川犀及南犀紋皆細烏犀尚有顯紋者露黃犀紋絶少皆不及西番所出紋高雨腳顯也物像黃外黑者為正透物像黑外黃者為倒透蓋以烏為正以形像肖物者為貴既曰通犀又須紋頭顯黃黑分明透不脫有雨腳滑潤者為第一鹿取茸犀取尖其精鋭之力盡在是矣犀角尖磨服為佳若在湯散則屑之西番者佳羚羊角今皆取有挂痕者陳藏器取耳邊聽之集集鳴者良亦強出此説未嘗遍試也今將他角附耳皆集集有聲不如有挂痕一説盡矣然多偽為之不可不察羖羊角出陝西河東謂之羖䍽羊尤很健毛最長而厚此羊可入藥如要食不如無角白大羊本草不言者亦有所遺爾又同華之間有臥沙細肋其羊有角似羖羊但低小供饌在諸羊之上張仲景治寒疝用生薑羊肉湯服之無不驗又一婦人産當寒月寒氣入産門臍下脹滿手不敢犯此寒疝也醫將治之以抵當湯謂其有瘀血嘗教之曰非其治也可服張仲景羊肉湯少減水二服遂愈牛角腮此則黃牛角腮用尖燒為黑灰微存性治婦人血崩大便血及冷痢又白水牛鼻乾溼皆可用治偏風口喎斜以火炙熱於不患處一邊尉之漸正犬膽塗鉛如金色又救生接元氣補虛損憊黃狗脊骨一條去兩頭截為五七段帶肉些小用好硇砂一兩細研漿水二升入硇砂在漿水中攪勻浸骨三日後以炭火炙令黃色又入汁蘸候汁盡為度其狗骨已酥脆搗令極細後入諸藥肉蓯蓉去沙薄切火焙乾菟絲子酒浸二日曝乾杜仲去粗皮肉桂去皮上粗澀附子炮去皮臍鹿茸急燎去毛酥微炙黃色不可令焦乾薑炮以上各一兩蛇床子半兩微炒陽起石半兩酒煮一日令數人不住手研一日將前八味同杵羅為末次入陽起石並狗骨末用熟棗肉五兩酥一兩同和再搗千餘下看硬軟丸如小豆大曬乾每日空心鹽湯下二十丸鹿茸他獸肉多屬十二辰及八卦昔黃帝立子醜等為十二辰以名月又以名獸配十二辰屬故獐鹿肉為肉中第一者避十二辰也味亦勝他肉三祀皆以鹿臘其義如此茸最難得不破及不出卻血者蓋其力盡在血中獵時多有損傷故也茸上毛先薄以酥塗勻於烈焰中急灼之若不先以酥塗恐火焰傷茸俟毛淨微炙入藥今人亦能將麻茸偽為之不可不察也頭亦可釀酒然須作漿時稍益蔥椒角為膠別有法按月令冬至一陽生麋角解夏至一陰生鹿角解各逐陰陽分合如此解落今人用麋鹿茸作一種殆疏矣凡麋鹿角自生至堅完無兩月之久大者二十餘斤其堅如石計一晝夜須生數兩凡骨之類成長無速於此雖草木至易生亦無能及之豈可與凡骨血為比麋茸利補陽鹿茸利補陰凡用茸無須太嫩唯長四五寸茸端如馬硇紅者最佳須佐以他藥則有功虎骨頭脛與脊背入藥肉微咸陳藏器所注乙骨之事反射之目光墮地如白石之説必得之於人終不免其所誣也人或問曰風從虎何也風木也虎金也木受金制焉得不從故呼嘯則風生自然之道也所以治風攣急屈伸不得走疰癲疾驚癇骨節風毒等乃此義爾豹肉毛赤黃其紋黑如錢而中空比比相次此獸猛捷過虎故能安五臟補絶傷輕身又有土豹毛更無紋色亦不赤其形亦小此各自有種非能變為虎也聖人假喻而已恐醫家未喻故書之貍骨形類貓其紋有二一如連錢者一如虎紋者此二色貍皆可入藥其肉味與狐不相遠江西一種牛尾貍其尾如牛人多糟食未聞入藥孟詵云骨理痔病作羹臛食之然則骨如何羹臛音郝肉羹也炙骨和麝香雄黃為丸服治痔及瘻瘡甚效兔有白毛者全得金之氣也入藥尤功余兔至秋深時則可食金氣全也才至春夏其味變取四腳肘後毛為逐食飼雕鷹至次日吐出其意欲腹中逐盡脂肥使飢急捕逐速爾然作醬必使五味即患豌豆瘡又食此則發毒太甚恐斑爛損人鼺音羸鼠經中不言性味惟是於難産通用藥中雲鼺鼠微溫毛赤黑色長尾人捕得取皮為暖帽但向下飛則可亦不能致遠今關西山中甚有毛極密人謂之飛生者是也注中又引水馬首如馬身如蝦背傴僂身有竹節紋長二三寸今謂之海馬鼴鼠鼴鼠也其毛色如鼠今京畿田中甚多腳絶短但能行尾長寸許目極小項尤短兼易掘取或安竹弓射之用以飼鷹陶不合更引今諸山林中大如水牛形似豬灰赤色者也設使是鼠則熟能見其溺精成鼠也陶如此輕信但真醇之士不以無稽之言為妄矣今經云在土中行則蚡鼠無疑獺四足俱短頭與身尾皆扁毛色若故紫帛大者身與尾長三尺余食魚居水中出水亦不死亦能休於大木上世謂之水獺嘗縻置大水甕中於其間旋轉如風水謂之成旋壠起四面高中心凹下觀者駭目皮西戎將以飾毳服領袖問之云垢不著如風霾翳目即就袖口拭目中即出又毛端果不著塵亦一異也又本草序例言獺膽分杯嘗試之不驗惟塗於盞唇但使酒稍高於盞面分杯之事亦古今傳誤言也不可不正之肝用之有驗狐今用肝治風皮兼毛用為裘者是也此獸多疑極審聽人智出之以多疑審聽而捕取捕者多用罝猯猯肥矮毛微灰色頭連脊毛一道黑嘴尖黑尾短闊蒸食之極美貉形如小狐毛黃褐色野獸中猯肉最甘美仍益瘦人野豬黃野豬黃在膽中治小兒諸癇疾京西界野豬甚多形如家豬但腹小腳長毛色褐作群行豬人惟敢射最後者射中前奔者則群豬散走傷人肉色赤如馬肉其味甘肉復軟微動風黃不常有間得之世亦少用食之尚勝家豬驢肉食之動風脂肥尤甚屢試屢驗日華子以謂止風狂治一切風未可憑也煎膠用皮者取其發散皮膚之外也仍須烏者用烏之意如用烏雞子烏蛇烏鴉之類其物雖治風然更取其水色蓋以制其熱則生風之義膃肭臍今出登萊州藥性論以謂是海內狗外腎日華子又謂之獸今觀其狀非狗非獸亦非魚也但前即似獸尾即魚其身有短密淡青白毛腹脅下全白仍相間於淡青白毛上有深青黑點久則色復淡皮厚且韌如牛皮邊將多取以飾鞍韉其臍治臍腹積冷精衰脾腎勞極有功不待別試也似狐長尾之説蓋今人多不識麂獐之屬又小於獐但口兩邊有長牙好鬥則用其牙皮為第一無出其右者然多牙傷痕四方皆有山深處則頗多其聲如擊破鈸野駝生西北界等處家生者峰蹄最精人多煮熟糟啖糞為乾末搐鼻中治鼻衄此西番多用嘗進貢於彼屢見之敗鼓皮黃牛皮為勝今不言是何皮蓋亦以驢馬皮為之者唐韓退之所謂牛溲馬勃敗鼓之皮俱收並蓄待用無遺者今用處少爾尤好煎膠專用牛皮始可入藥丹雄雞今言赤雞者是也蓋以毛色言之巽為雞為風雞鳴於五更者日將至巽位感動其氣而鳴也體有風人故不可食經所著其用甚備産後血暈身痙直帶眼口角與目外眥向上牽急不知人取子一枚去殼分清以荊芥末二錢調服遂安仍依次調治若無他疾則不須治甚敏捷烏雞子尤善經注皆不言雞發風今體有風人食之無不發作為雞為巽信可驗矣食雞者當謹鶩音牧肪陶隱居云鶩即是鴨然有家鴨有野鴨陳藏器本草曰尸子云野鴨為鳧家鴨為鶩蜀本注云爾雅云野鳧鶩注云鴨也如此則鳧鶩皆是鴨也又云本經用鶩肺即家鴨也如此所説各不同其義不定又按唐王勃滕王閣記云落霞與孤鶩齊飛則明知鶩為野鴨也勃唐之名儒必有所據故知鶩為野鴨明矣雁肪人多不食者謂其知陰陽之升降分長少之行序世或謂之天厭亦道家之一説爾食之則治諸風唐本注曰雁為陽鳥其義未盡茲蓋得中和之氣熱則即北寒則即南以就和氣所以為禮幣者一以取其信二取其和鷓鴣鷓鴣鄭谷所謂相呼相應湘天闊者南方專充庖然治瘴及茵毒甚效余悉如經雉其飛若矢一往而墮故今人取其尾置船車上意欲如此快速也漢呂太后名雉高祖字之曰野雞其實即雞屬也食之所損多所益少鷹屎白鷹屎白兼他藥用之作潰虛積藥治小兒奶癖黃鷹糞白一錢密陀僧一兩舶上硫黃一分丁香二十一個上為末每服一字三歲以上半錢用乳汁或白麵湯調下並不轉瀉一復時取下青黑物後服補藥醋石榴皮半兩炙黑色伊祁一分木香一分麝香半錢同為末每服一字溫薄酒調下並吃二服凡小兒脅下硬如有物乃是癖氣俗謂之奶脾只服溫脾化積氣丸子藥不可取轉無不愈也取之多失雀卵孟詵云肉十月以後正月以前食之此蓋取其陰陽靜定未決泄之義卵亦取第一番者鸛頭無丹項無烏帶身如鶴者是兼不善唳但以喙相擊而鳴作池養魚蛇以哺子之事豈可垂示後世此禽多在樓殿吻上作窠日夕人觀之故知其未審耳礜石條中亦著伏翼伏翼屎合疳藥白日亦能飛但畏鷙鳥不敢出此物善服氣故能壽冬月不食亦可驗也孔雀孔雀尾不可入目昏翳人眼鸕鷀陶隱居云此鳥不卵生口吐其雛今人謂之水老鴉巢於大木群集宿處有常久則木枯以其糞毒也懷妊者不敢食為其口吐其雛陳藏器復云使易産臨時令産婦執之與陶相戾嘗官於澧州公宇後有大木一株其上有三四十巢日夕觀之既能交合兼有卵殼布地其色碧豈得雛吐口中是全未考尋可見當日聽人之誤言也白鴿白鴿其毛羽色於禽中品第最多野鴿糞一兩炒微焦麝香別研吳白朮各一分赤芍藥青木香各半兩柴胡三分延胡索一兩炒赤色去薄皮七物同為末溫無灰酒空心調一錢服治帶下排膿候膿盡即止後服仍以他藥補血臟斑鷦斑鷦斑鳩也嘗養之數年並不見春秋分化有有斑者有無斑者有灰色者有小者有大者久病虛損人食之補氣雖有此數其用即一也鶉鶉有雌雄從卵生何言化生其説甚容易嘗于田野屢得其卵初生謂之羅鶉至初秋謂之旦秋中秋以後謂之白唐然一物四名當悉書之小兒患疳及下痢五色旦旦食之有效
