body:
  text: 卷二十胡麻諸家之説參差不一只是今脂麻更無他義蓋其種出於大宛故言胡麻今胡地所出者皆肥大其紋鵲其色紫黑故如此區別取油亦多故詩云松下飯胡麻此乃是所食之谷無疑與白油麻為一等如川大黃川當歸川升麻上黨人參齊州半夏之類不可與他土者更為一物蓋特以其地之所宜立名也是知胡麻與白油麻為一物嘗官於順安軍雄霸州之間備見之又二條皆言無毒治療大同今之用白油麻世不可一日闕也然亦不至於大寒宜兩審之青蘘音箱即油麻葉也陶隱居注亦曰胡麻葉也胡地脂麻鵲色子頗大日華子云葉作湯沐潤毛髮乃是今人所取胡麻葉以湯浸之良久涎出湯遂稠黃色婦人用之梳髮由是言之胡麻與白油麻今之所謂脂麻者是矣青蘘即其葉無疑大麻子海東來者最勝大如蓮實出毛羅島其次出上郡北地大如豆南地者子小去殼法取麻子帛包之沸湯中浸湯冷出之垂井中一夜勿令著水次日日中曝乾就新瓦上挼去殼簸揚取仁粒粒皆完張仲景麻仁丸是用此大麻子白油麻與胡麻一等但以其色言之比胡麻差淡亦不全白今人只謂之脂麻前條已具炒熟乘熱壓出油而謂之生油但可點照須再煎煉方謂之熟油始可食復不中點照亦一異也如鐵自火中出而謂之生鐵亦此義耳飴糖即糃是也多食動脾風今醫家用以和藥糯與粟米作者佳余不堪用蜀黍米亦可造不思食人少食之亦使脾胃氣和唐白樂天詩一楪膠牙糃者是此生大豆有緑褐黑三種亦有大小兩等其大者出江浙湖南北黑小者生他處今用小者力更佳炒熟以棗肉同搗之為麩代糧又治産後百病血熱並中風疾痱止痛背強口噤但煩熱瘛瘲若渴身背腫劇嘔逆大豆五升急水淘淨無灰酒一斗熬豆令微煙出傾入酒瓶中沃之經一日以上服酒一升取瘥為度如素不飲酒即量多少服若口噤即加獨活半斤微微椎破同沃仍增酒至一斗二斤暑月旋作恐酸壞又可磑為腐食之赤小豆食之行小便久則虛人令人黑瘦枯燥關西河北京東西多食之花治宿酒渴病大麥性平涼有人患纏喉風食不能下將此面作稀糊令咽之既滑膩容易下咽以助胃氣三伏中朝廷作麨以賜臣下作蘖造糃青黃白粱米此三種食之不及黃粱青白二種性皆微涼獨黃粱性甘平豈非得土之中和氣多邪今黃白二種西洛間農家多種為飯尤佳余用則不相宜然其粒尖小於他谷收實少故能種者亦稀白色者味淡粟米利小便故益脾胃丹黍米黍皮赤其米黃惟可為糜不堪為飯黏著難解然亦動風蘖米此則粟蘖也今穀神散中用之性又溫於大麥秫米初搗出淡黃白色經久色如糯用作酒者是此米亦不堪為飯最黏故宜酒陳廩米今經與諸家注説皆不言是粳米為復是粟米然粳粟二米陳者性皆冷頻食之令人自利與經所説稍戾煎煮亦無膏膩入藥者今人多用新粟米至如舂杵頭細粳又復不言新陳粳粟然皆不及新稻粟二糟陳則氣味已腐敗酒呂氏春秋曰儀狄造酒戰國策曰帝女儀狄造酒進之於禹然本草中已著酒名信非儀狄明矣又讀素問首言以妄為常以酒為漿如此則酒自黃帝始非儀狄也古方用酒有醇酒春酒社壇余胙酒槽下酒白酒青酒好酒美酒葡萄酒秫黍酒粳酒蜜酒有灰酒新熟無灰酒地黃酒今有糯酒煮酒小豆麴酒香藥麴酒鹿頭酒恙兒等酒今江浙湖南北又以糯米粉入衆藥和合為曲曰餅子酒至於官務中亦用四夷酒更別中國不可取以為法今醫家所用酒正宜斟酌但飲家惟取其味不顧入藥如何爾然久之未見不作疾者蓋此物損益兼行可不謹歟漢賜丞相上樽酒糯為上稷為中粟為下者今入藥佐使專以糯米用清水白麵曲所造為正古人造麴未見入諸藥合和者如此則功力和厚皆勝余酒今人又以麥蘖造者蓋只是醴爾非酒也書曰若作酒醴爾惟麴櫱酒則須用曲醴故用蘖蓋酒與醴其氣味甚相遼治療豈不殊也扁豆有黑白鵲三等皆於豆脊有白路白者治霍亂筋轉粳米白晚米為第一早熟米不及也平和五臟補益胃氣其功莫逮然稍生則復不益脾過熟則佳稻米今造酒者是此水田米皆謂之稻前既言粳米即此稻米乃糯稻無疑溫故可以為酒酒為陽故多熱又令人大便堅非糯稻孰能與於此西域記天竺國土溽熱稻歲四熟亦可驗矣稷米今謂之穄米先諸米熟又其香可愛故取以供祭祀然發故疾只堪為飯不黏著其味淡罌子粟其花亦多葉者其子一罌數千萬粒大小如葶藶子其色白隔年種則佳研子以水煎仍加蜜為罌粟湯服石人甚宜飲醋酒糟為之乞鄰者是此物然有米醋麥醋棗醋米醋最釅入藥多用穀氣全也故勝糟醋産婦房中常得醋氣則為佳酸益血也磨雄黃塗蜂蠆亦取其收而不散也今人食酸則齒軟謂其水生木水氣弱木氣盛故如是造靴皮須得此而紋皺故知其性收斂不負酸收之説醬聖人以謂不得即不食意欲五味和五臟悅而受之此亦安樂之一端小麥暴淋煎湯飲為面作糊入藥水調治人中暑馬病肺卒熱亦以水調灌愈生嚼成筋可以黏禽蟲
