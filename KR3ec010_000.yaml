body:
  text: 本草衍義提要宋政和中醫官通直郎收買藥材所辨驗藥材寇宗奭撰朝公武讀書志陳直齊書録解題皆有著録政和六年提舉荊武北路常平等事劉亞夫申投尚書省太醫學博士李康看詳狀申有旨轉一官添差充收買藥材所辨驗藥材宣和元年其侄宣教郎知解州解縣丞寇約鏤本印行宗奭里貫無考以扎付及卷六礜石條菊花水條卷十三桑寄生條推之知其曾官杭州永耀順安軍等處由承直郎澧州司戶進書轉一官而已宗奭以禹錫所修慎微策所續本草尚有差失因參考諸家事實忝以目驗核以情理拾遺糾謬援引辨證發明良多凡名未用而意義已盡者皆不編入其所辨證如東壁土取太陽少火之壯冬灰取冬令燒灼之久水味不因菊花而香鼴鼠不能遺溺生子玉泉為玉漿之訛石中黃子為黃水之誤皆能實事求是切實證明洵本草之功臣醫林之津筏也東垣丹溪諸公皆尊信之故丹溪有衍義補遺之作惟以蘭花為蘭草卷丹為百合微有差誤耳宋時嘗與證類本草別本單行自金人張存惠採附證類本草之中金元刻本仍之單行本殆絶版矣歸安陸公心源藏有南宋麻沙本完全無缺爰收刊本集以廣其傳
