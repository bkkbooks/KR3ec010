front:
  text: 序本草衍義二十卷宋通直郎添差充收買藥材所辨驗藥材寇宗奭撰朝公武讀書志陳直齊書録解題皆著於録政和六年提舉荊湖北路常平等事劉亞夫申投尚書省太醫學博士李康看詳狀申有旨轉一官添差充收買藥材所辨驗藥材宣和元年其侄宣教郎和解州解縣丞寇約鏤板印行宗奭里貫無考以扎付及卷六礜石條菊花水條卷十三桑寄生條推之知其曾官杭州永耀順安軍等處由承直郎澧州司戶進書轉一官而已神農本草之名始見於梁七録凡三百六十五種陶隱居又增三百六十五種是為名醫別録唐顯慶中命蘇恭等參考得失增一百一十四種是為唐本草宋太祖命劉翰等以醫家嘗用有效者增一百三十三種是為開寶重定本草仁宗命掌禹錫等再加校正增一百種是為嘉祐補注本草蜀人唐慎微博採群書增六百餘種是為經史證類本草徽宗又命曹孝忠刊正之是為政和重修經史證類備用本草宗奭以禹錫所修慎微所續尚有差失因考諸家參以目驗拾遺糾謬著為此書凡名未用而意義已盡者皆不編入其所辨證如東壁土取太陽少火之壯冬灰取冬令燒灼之久水味不因菊花而香鼴鼠不能遺溺生子玉泉為玉漿之訛石中黃子為黃水之訛皆能實事求是疏通證明洵乎本草之功臣醫林之津筏也宋時與證類本草別本單行自金人張存惠採附證類本草之中明人因之而單行本遂微余所藏為南宋麻沙本完善無缺因重梓以廣其傳光緒三年歲在強圉赤奮若仲冬之月歸安陸心源撰
