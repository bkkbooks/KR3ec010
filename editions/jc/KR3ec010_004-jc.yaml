body:
  text: 卷四玉泉經云生藍田山谷採無時今藍田山谷無玉泉泉水古今不言採又曰服五斤古今方水不言斤又曰一名玉札如此則不知定是何物諸家所解更不言泉但為玉立文陶隱居雖曰可消之為水故名玉泉誠如是則當言玉水亦不當言玉泉也蓋泉具流布之義別之則無所不通易又曰山下出泉蒙如此則誠非止水終未臻厥理今詳泉字乃是漿字於義方允漿中既有玉故曰服五斤去古既遠亦文字脫誤也採玉為漿斷無疑焉且如書篇尚多亡逸況本草又在唐堯之上理亦無怪謂如蛇含本草誤為蛇全唐本注云全字乃是舍字陶見誤本改為含尚如此不定後有鐵漿其義同此又道藏經有金飯玉漿之文唐李商隱有瓊漿未飲結成冰之詩是知玉誠可以為漿又荊門軍界有玉泉寺中有泉與尋常泉水無異亦不能治病寺中日用此水又西洛有萬安山山腹間有寺曰玉泉嘗兩登是山質玉泉之疑寺僧皆懵不能答寺前有泉一派供寺中用泉竇皆青石與諸井水無異若按別本注玉泉玉之泉液也以仙室玉池中者為上如此則舉世不能得亦漫立此名故知別本所注為不可取又有燕玉出燕北體柔脆如油和粉色不入藥當附於此丹砂今人謂之硃砂辰州硃砂多出蠻峒錦州界狤獠峒老鴉井其井深廣數十丈先聚薪於井滿則縱火焚之其青石壁迸裂處即有小龕龕中自有白石床其石如玉床上乃生丹砂小者如箭鏃大者如芙蓉其光明可鑑研之鮮紅砂泊床大者重七八兩至十兩者晃州亦有形如箭鏃帶石者得自土中非此之比也此物鎮養心神但宜生使煉服少有不作疾者亦不減硫黃輩又一醫流服伏火者數粒一旦大熱數夕而斃李善勝嘗煉硃砂為丹經歲余沐浴再入鼎誤遺下一塊其徒丸服之遂發懵冒一夕而斃其生硃砂初生兒便可服因火力所變遂能殺人可不謹也空青功長於治眼仁廟朝嘗詔御藥院須中空有水者將賜近戚久而方得其楊梅青治醫極有功中亦或有水者其用與空青同第有優劣耳今信州冗山而取世謂之楊梅青極難得綠青即石碌是也其石黑綠色者佳大者刻為物形或作器用又同硇砂作吐風涎藥驗則驗矣亦損心肺雲母古雖有服煉法今人服者至少謹之至也市廛多折花朵以售之今惟合雲母膏治一切癰毒瘡等惠民局別有法石鐘乳蕭炳云如蟬翼爪甲者為上如鵝管者下經既言乳今復不取乳此何義也蓋乳取其性下不用如雁齒者謂如烏頭附子不用尖角之義同但明白光潤輕鬆色如煉硝石者佳服煉別有法朴硝是初採掃得一煎而成者未經再煉治故曰朴硝其味酷澀所以力堅急而不和可以熟生牛馬皮及治金銀有偽葛洪治食鱠不化取此以蕩逐之臘月中出新瓦罐滿注熱水用朴硝二升投湯中攪散掛北檐下俟消滲出罐外羽收之以人乳汁調半錢掃一切風熱毒氣攻注目瞼外及發於頭面四肢腫痛應手神驗芒硝經云生於朴硝乃是朴硝以水淋汁澄清再經熬煉減半傾木盆中經宿遂結芒有廉稜者故其性和緩古今多用以治傷寒硝石是再煎煉時已取訖芒硝凝結在下如石者精英既去但余滓而已故功力亦緩惟能發煙火唐本注蓋以能消化諸石故名硝石煎柳枝湯煮三周時即伏火湯耗即又添柳枝湯英硝是消之精英者其味甘即馬牙硝也別有法煉治而成由其煎煉故其味亦別治五臟積熱然四物本出於一物由此煎煉故分出精粗所以其用亦不相遠礬石今坊州礬務以野火燒過石取以煎礬色惟白不逮晉州者皆不可多服損心肺卻水故也水化書紙上才幹水不能濡故知其性卻水治涎藥多須者用此意爾火枯為粉貼嵌甲牙縫中血出如衄者貼之亦愈滑石今謂之畫石以其軟滑可寫畫淋家多用若暴得吐逆不下食以生細末貳錢匕溫水服仍急以熱面半盞押定紫石英明澈如水精其色紫而不勻張仲景治風熱瘛瘲及驚癇瘛瘲風引湯紫石英白石英寒水石石膏乾薑大黃龍齒牡蠣甘草滑石等分混合㕮五汝切咀子與切以水一升煎去三分食後量多少溫呷不用滓服之無不效者白石英狀如紫石英但差大而六稜白色如水精紫白二石英當攻疾可暫煮汁用未聞久服之益張仲景之意只令㕮咀不為細末者豈無意焉其久服更宜詳審赤石脂今四方皆有以舌拭之黏著者為佳有人病大腸寒滑小便精出諸熱藥服及一斗二升未甚效後有人教服赤石脂乾薑各一兩胡椒半兩同為末醋糊丸如梧桐子大空心及飯前米飲下五七十丸終四劑遂愈白石脂有初生未滿月小兒多啼叫致臍中血出以白石脂細末貼之即愈未愈微微炒過放冷再貼仍不得剝揭石中黃子石中黃子此又字誤也子當作水況當條自言未成餘糧黃濁水焉得卻名之子也若言未乾者亦不得謂之子也子字乃水字無疑又曰太一餘糧者則是兼石言之者也今醫家用石中黃只石中乾者及細末者即便是若用禹餘糧石即用其殼故本條言一名石腦須火燒醋淬如此即是石中黃水為一等石中黃為一等太一餘糧為一等斷無疑焉婆娑石今則轉為摩娑石如淡色石綠間微有金星者佳磨之色如淡乳汁其味淡又有豆斑石亦如此石但於石上有黑斑點無金星無名異今圖經曰本經云味甘平治金瘡折傷生肌肉今云味鹹寒消腫毒癰腫與本經所說不同疑別是一種今詳上文三十六字未審今云字下即不知是何處云也菩薩石出峨嵋山中如水精明澈日中照出五色光如峨嵋普賢菩薩圓光因以名之今醫家鮮用
