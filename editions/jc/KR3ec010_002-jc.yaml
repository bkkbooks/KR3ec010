body:
  text: 卷二序例中人之生實陰陽之氣所聚耳若不能調和陰陽之氣則害其生故寶命全形篇論曰人以天地之氣生又曰天地合氣命之曰人是以陽化氣陰成形也夫遊魂為變者陽化氣也精氣為物者陰成形也陰陽氣合神在其中矣故陰陽應象大論曰天地之動靜神明為之綱紀即知神明不可以陰陽攝也易所以言陰陽不測之謂神蓋為此矣故曰神不可大用大用即竭形不可大勞大勞則斃是知精氣神人之大本不可不謹養智者養其神惜其氣以固其本世有不謹衛生之經者動皆觸犯既以犯養生之禁須假以外術保救不可坐以待斃本草之經於是興焉既知保救之理不可不窮保救之事衍義於是存焉二者其名雖異其理僅同欲使有知無知盡臻壽域率至安樂之鄉適是意者求其意而可矣養心之道未可忽也六慾七情千變萬化出沒不定其言至簡其義無窮而以一心對無窮之事不亦勞乎心苟不明不為物所病者未之有也故明達之士遂至忘心心既忘矣則六慾七情無能為也六慾七情無能為故內事不生內事不生故外患不能入外患不能入則本草之用實世之蒭狗耳若未能達是意而至是地則未有不緣六慾七情而起憂患者憂患既作則此書一日不可闕也愚何人哉必欲斯文絕人之憂患乎上隱居以謂凡篩丸散藥畢皆更合於臼中以杵搗數百過如此恐乾末湔蕩不可搗不若令力士合研為佳又曰凡湯酒膏中用諸石皆細搗之如粟亦可以葛布篩令調勻並以綿裹內中其雄黃硃砂輩細末如粉今詳之凡諸石雖是湯酒中亦須稍細藥力方盡出效亦速但臨服須澄濾後再下火不爾恐遺藥力不見效湯酒中尚庶幾若在服食膏中豈得更如粟也不合如此立例當在臨時應用詳酌爾又說㕮咀兩字唐本注謂為商量斟酌非也嘉祐復符陶隱居說為細切亦非也儒家以謂有含味之意如人以口齒咀齧雖破而不塵但使含味耳張仲景方多言㕮咀其義如此病人有既不洞曉醫藥復自行臆度如此則九死一生或醫人未識其病或以財勢所迫占奪強治如此之輩醫家病家不可不察也要在聰明賢達之士掌之則病無不濟醫無不功世間如此之事甚多故須一一該舉以堤或然夫人有貴賤少長病當別論病有新久虛實理當別藥蓋人心如面各各不同惟其心不同臟腑亦異臟腑既異乃以一藥治眾人之病其可得乎故張仲景曰又有土地高下不同物性剛柔餐居亦異是故黃帝興四方之問岐伯舉四治之能臨病之功宜須兩審如是則依方合藥一概而用亦以疏矣且如貴豪之家形樂志苦者也衣食足則形樂心慮多則志苦岐伯曰病生於脈形樂則外實志苦則內虛故病生於脈所養既與貧下異憂樂思慮不同當各逐其人而治之後世醫者直委此一節閉絕不行所失甚矣嘗有一醫官暑月與貴人飲貴人曰我昨日飲食所傷今日食減醫曰可餌消化藥他人當服十丸公當減其半下咽未久疏逐不已幾至斃以此較之虛實相遼不可不察故曰病當別論又一男子暑月患血痢醫妄以涼藥逆制專用黃連阿膠木香藥治之此藥始感便治則可今病久腸虛理不可服逾旬不已幾致委頓故曰理當別藥如是論之誠在醫之通變又須經歷則萬無一失引此為例余可效此凡用藥必須擇州土所宜者則藥力具用之有據如上黨人參川蜀當歸齊州半夏華州細辛又如東壁土冬月灰半天河水熱湯漿水之類其物至微其用至廣蓋亦有理若不推究厥理治病徒費其功終亦不能活人聖賢之意不易盡知然舍理何求哉凡人少長老其氣血有盛壯衰三等故岐伯曰少火之氣壯壯火之氣衰蓋少火生氣壯火散氣況復衰火不可不知也故治法亦當分三等其少日服餌之藥於壯老之時皆須別處之決不可忽也世有不留心於此者往往不信遂致困危哀哉今人使理中湯丸倉猝之間多不效者何也是不知仲景之意為必效藥蓋用藥之人有差殊耳如治胸痹心中痞堅氣結胸滿脅下逆氣搶心理中湯主之人參朮乾薑甘草四物等共一十二兩水八升煮取三升每服一升日三服以知為度或作丸須雞子黃大皆奇效今人以一丸如楊梅許服之病既不去乃曰藥不神非藥之罪用藥者之罪也今引以為例他可仿此然年高及素虛寒人當遂宜減甘草夫高醫以蓄藥為能倉猝之間防不可售者所須也若桑寄生桑螵蛸鹿角膠天靈蓋虎膽蟾酥野駝螢蓬蘽空青婆娑石石蟹冬灰臘雪水松黃之類如此者甚多不能一一遍舉唐元澹字行沖嘗謂狄仁傑曰下之事上譬富家儲積以自資也脯臘膎胰以供滋膳參朮芝桂以防疾疢門下充旨味者多矣願以小人備一藥可乎仁杰笑曰公正吾藥籠中物不可一日無也然梁公因事而言獨譬之以藥則有以見天下萬物之中尤不可闕者也知斯道也知斯意而已凡為醫者須略通古今粗守仁義絕馳驚能所之心專博施救拔之意如此則心識自明神物來相又何必慼慼沽名齪齪求利也如或不然則曷以致姜撫沽譽之慚逋華佗之矜能受戮乎嘗讀唐方技傳有云醫要在視脈唯用一物攻之氣純而愈速一藥偶得他藥相制弗能專力此難愈之驗也今詳之病有大小新久虛實豈可止以一藥攻之若初受病小則庶幾若病大多日或虛或實豈得不以他藥佐使如人用硫黃皆知此物大熱然石性緩倉猝之間下咽不易便作效故智者又以附子乾薑桂之類相佐使以發之將併力攻疾庶幾速效若單用硫黃其可得乎故知許嗣宗之言未可全信賢者當審度之夫用藥如用刑刑不可誤誤即幹人命用藥亦然一誤即便隔生死然刑有鞫司鞫成然後議定議定然後書罪蓋人命一死不可復生故須如此詳謹今醫人才到病家便以所見用藥若高醫識病知脈藥又相當如此即應手作效或庸下之流孟浪亂投湯劑逡巡便致困危如此殺人何太容易世間此事甚多良由病家不擇醫平日未嘗留心於醫術也可不懼哉
