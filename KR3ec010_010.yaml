body:
  text: 卷十款冬花百草中惟此不顧冰雪最先春也世又謂之鑽凍雖在冰雪之下至時亦生芽春時入或採以代蔬入藥須微見花者良如已芬芳則都無力也今人又多使如箸頭者恐未有花爾有人病咳多日或教以然款冬花三兩枚於無風處以筆管吸其煙滿口則咽之數日效牡丹用其根上皮花亦有緋者如西洛潛溪緋是也今禁苑又有深碧色者惟山中單葉花紅者為佳家椑子次之若移枝接者不堪用為其花葉既多發奪根之氣也何以知之今千葉牡丹初春留花稍多來年花枝並葉便瘦多是開不成市人或以枝梗皮售於人其乖殊甚女苑一名白苑或者謂為二物非也唐刪去白苑之條甚合宜陶能言不能指說性狀余從經中所說甚明今直取經澤蘭按補注云葉如蘭今蘭葉如麥門冬稍闊而長及一二尺無枝梗殊不與澤蘭相似澤蘭才出土便分枝梗葉如菊但尖長若取其香嗅則稍相類既謂之澤蘭又曰生汝南大澤旁則其種本別如蘭之說誤矣地榆性沉寒入下焦熱血痢則可用若虛寒人及水瀉白痢即未可輕使白前保定肺氣治嗽多用白而長於細辛但粗而脆不似細辛之柔以溫藥相佐使則尤佳余如經土瓜體如栝樓其殼徑寸一種長二寸許上微圓下尖長七八月間熟紅赤色殼中子如螳螂頭者今人又謂之赤雹子其根即土瓜根也於細根上又生淡黃根三五相連如大指許根與子兩用紅子同白土子治頭風薺苨今陝州採為脯別有法甚甘美兼可寄遠古人以謂薺苨似人參者是此解藥毒甚驗積雪草今南方多有生陰濕地不必荊楚形如水荇而小面亦光潔微尖為異今人謂之連錢草蓋取象也其葉各生搗爛貼一切熱毒癰疽等秋後收之蔭干為末水調莎草其根上如棗核者又謂之香附子亦入印香中亦能走氣今人多用雖生於莎草根然根上或有或無有薄皸皮紫黑色非多毛也刮去皮則色白若便以根為之則誤矣其味苦惡實惡實是子也今謂之牛蒡未去萼時又謂之鼠黏子根謂之牛菜疏風壅涎唾多咽膈不利微炒同入荊芥穗各一兩甘草炙半兩併為末食後夜臥湯點二錢服當緩取效子在萼中萼上有細鉤多至百十謂之芒則誤矣根長一二尺粗如拇指煮爛為菜大小薊大小薊皆相似花如髻但大薊高三二尺葉皺小薊高一尺許葉不皺以此為異小薊山野人取為蔬甚適用雖有微芒亦不能害人艾葉艾葉乾搗篩去青滓取白入石硫黃為硫黃艾灸家用得米粉少許可搗為末入服食藥入硫黃別有法陟釐陟釐今人治為苔脯堪啖京城市者甚多然治渴疾仍須禁食鹽余方家亦罕用菟葵緑葉如黃蜀葵花似拗霜甚雅形如至小者初開單葉蜀葵有檀心色如牡丹姚黃蕊則蜀葵也唐劉夢得還京云唯菟葵燕麥動搖春風者是也白藥白藥今為治馬肺熱藥有效蘹香子今人只呼為茴香治膀胱冷氣及腫痛亦調和胃氣唐本注似老胡荽此誤矣胡荽葉如蛇床蘹香徒有葉之名但散如絲髮特異諸草枝上時有大青蟲形如蠶治小腸氣甚良鬱金鬱金不香今人將染婦人衣最鮮明然不奈日炙染成衣則微有鬱金之氣肉豆蔻對草豆蔻言之去殼只用肉肉油色者佳枯白味薄瘦虛者下等亦善下氣多服則泄氣得中則和來其氣茅香茅香花白根如茅但明潔而長皆可作浴湯同藁本尤佳仍入印香中合香附子用青黛青黛乃藍為之有一婦人患臍下腹上下連二陰遍滿生濕瘡狀如馬瓜瘡他處並無熱癢而痛大小便澀出黃汁食亦減身面微腫醫作惡瘡治用鰻鱺魚松脂黃丹之類藥塗上瘡愈熱痛愈甚治不對故如此問之此人嗜酒貪啖喜魚蟹發風等物令急用溫水洗拭去膏藥尋以馬齒莧四兩爛研細入青黛一兩再研勻塗瘡上即時熱減痛癢皆去仍服八政散日三服分敗客熱每塗藥得一時久藥已乾燥又再塗新濕藥凡如此及日減三分之一五日減三分之二自此二十日愈既愈而問曰此瘡何緣至此曰中下焦蓄風熱毒氣若不出當作腸癰內痔仍常須禁酒及發風物然不能禁酒後果然患內痔零陵香零陵香至枯乾猶香入藥絶可用婦人浸油飾發香無以加此即蕙草是也天麻天麻用根須別藥相佐使然後見其功仍須加而用之人或蜜漬為果或蒸煮食用天麻者深思之則得矣苗則赤箭也蓽茇蓽茇走腸胃中冷氣嘔吐心腹滿痛多服走泄真氣令人腸虛下重使君子紫黑色四稜高瓣深今經中謂之稜瓣深似令人難解秋末冬初人將入鼎澧其仁味如椰子肉經不言用仁為復用皮今按文味甘即是用肉然難得仁蓋絶小今醫家或兼用殼密蒙花利州路甚多葉冬亦不凋然不似冬青蓋柔而不光潔不深緑花細碎數十房成一朵冬生春開此木也今居草部恐未盡善
