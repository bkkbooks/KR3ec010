body:
  text: 卷五金屑不曰金而更加屑字者是已經磨屑可用之義如玉漿之義同本經不解屑為未盡蓋須烹煉鍛屑為薄方可研屑入藥陶隱居云凡用銀屑以水銀和成泥若非鍛屑成薄焉能以水銀和成泥也獨不言金屑亦其闕也生金有毒至於殺人仍為難解有中其毒者惟鷓鴣肉可解若不經鍛屑則不可用顆塊金即冗山或至百十尺見伴金石其石褐色一頭如火燒黑之狀此定見金也其金色深赤黃麩金即在江沙水中淘汰而得其色淺黃此等皆是生金也得之皆當銷煉麩金耗折少塊金耗折多入藥當用塊金色既深則金氣足余更防罨製成及點化者如此焉得更有造化之氣也若本朝張永德字抱一並州人五代為潞帥淳化二年改並州初寓睢陽有書生鄰居臥病永德療之獲愈生一日就永德求汞伍兩即置鼎中煮成中金永德懇求藥法生曰君當貴吾不吝此慮損君福鍛工畢升言祥符年嘗在禁中為方士王捷鍛金以鐵為金凡百餘兩為一餅輻解為八段謂之鴉嘴金初自治中出色尚黑由是言之如此之類乃是水銀及鐵用藥製成非造化所成功治焉得不差殊如惠民局合紫雪用金蓋假其自然金氣爾然惡錫又東南方金色深西南方金色淡亦土地所宜也入藥故不如色深者然得余甘子則體柔亦相感爾銀屑金條中已解屑義銀本出於礦須煎煉而成故名熟銀所以於後別立生銀條也其用與熟銀大同世有術士能以硃砂而成者有鉛汞而成者有焦銅而成者非復更有造化之氣豈可更入藥既有此類不可不區別其生銀即是不自礦中出而特然自生者又謂之老翁須亦取像而言之耳然銀屑經言有毒生銀經言無毒釋者漏略不言蓋生銀已生髮於外無蘊郁之氣故無毒礦銀尚蘊蓄於石中鬱結之氣全未敷暢故言有毒亦惡錫水銀水銀入藥雖各有法極須審謹有毒故也婦人多服絶娠今人治小兒驚熱涎潮往往多用經中無一字及此亦宜詳諦得鉛則凝得硫黃則結並棗肉研之則散別法煅為膩粉粉霜唾研斃蝨銅得之則明灌尸中則令尸後腐以金銀銅鐵置其上則浮得紫河車則伏唐韓愈云太學博士李千遇信安人方士柳賁能燒水銀為不死藥以鉛滿一鼎按中為空實以水銀蓋封四際燒為丹砂服之下血比四年病益急乃死余不知服食説自何世起殺人不可計而世慕尚之益至此其惑也在文書所記及耳聞傳者不説今直取目見親與之遊而以藥敗者六七公以為世誡工部尚書歸登自説既服水銀得病若有燒鐵杖自顛貫其下摧而為火射竅節以出狂痛號呼乞絶其茵席得水銀發且止唾血十數年以斃殿中御史李虛中疽發其背死刑部尚書李遜謂余曰我為藥誤遂死刑部侍郎李建一旦無病死工部尚書孟簡邀我於萬州屏人曰我得祕藥不可獨不死今遺子一器可用棗肉為丸服之別一年而病後有人至訊之曰前所服藥誤方且下之下則平矣病二歲卒東川節度御史大夫盧坦溺血肉痛不可忍乞死金吾將軍李道古以柳賁得罪食賁藥五十死海上此可為誡者也蘄不死乃速得死謂之智可不可也五穀三牲鹽醯果蔬人所常御人相厚勉必曰強食今惑者皆曰五穀令人夭當務減節臨死乃悔嗚呼哀也已今有水銀燒成丹砂醫人不曉研為藥衣或入藥中豈不違誤可不謹哉水銀粉下涎藥並小兒涎潮瘛瘲多用然不可常服及過多多則其損兼行若兼驚則尤須審謹蓋驚為心氣不足不可下下之裡虛驚氣入心不可治若其人本虛便須禁此一物謹之至也雄黃非金苗今有金窟處無雄黃金條中言金之所生處處皆有雄黃豈處處皆得也別法治蛇咬焚之熏蛇遠去又武都者鐫磨成物形終不免其臭唐甄立言仕為太常丞有道人病心腹悶煩彌二歲診曰腹有蠱誤食發而然令餌雄黃一劑少選吐一蛇如拇指無目燒之有發氣乃愈此殺毒蠱之驗也雌黃入藥最稀服石者宜審諦治外功多方士點化術多用亦未聞其終始如何畫工或用之石硫黃今人和治下元虛冷元氣將絶久患寒泄脾胃虛弱垂命欲盡服之無不效中病當便已不可盡劑世人蓋知用而為福不知用久為禍此物損益兼行若俱棄而不用當倉猝之間又可闕乎或更以法制拒火而又常服者是亦弗思也在本朝則不言如此服良但專治婦人不知者往往更以酒服其可得乎或臟中久冷服之先利如病勢危急可加丸數服少則不效仍加附子乾薑桂陽起石如狼牙者佳其外色不白如薑石其大塊者亦內白治男子婦人下部虛冷腎氣乏絶子臟久寒須水飛研用凡石藥冷熱皆有毒正宜斟酌飛水石又謂之寒水石紋理通徹人或磨刻為枕以備暑月之用入藥燒過或市人燒入膩粉中以亂真不可不察也陶隱居言夏月能為冰者佳如此則舉世不能得似乎失言石膏二書紛辨不決未悉厥理詳本經元無方解石之説正緣唐本注石膏方解石大體相似因此一説後人遂惑經曰生齊山山谷及齊盧山魯蒙山採無時即知他處者為非今圖經中又以汾州者編入前後人都不詳經中所言細理白澤者良故知不如是則非石膏也下有理石條中經云如石膏順理而細又可明矣今之所言石膏方解石二者何等有順理細紋又白澤者有是則石膏也無是則非石膏也仍須是經中所言州土者方可入藥余皆偏見可略不取仲景白虎湯中服之如神新校正仲景傷寒論後言四月以後天氣熱時用白虎者是也然四方氣候不齊又歲中氣運不一方所既異雖其説甚雅當此之時亦宜兩審若傷寒熱病或大汗後脈洪大口舌燥頭痛大渴不已或著暑熱身痛倦怠白虎湯服之無不效磁石色輕紫石上皸澀可吸連針鐵俗謂之熁鐵石養益腎氣補填精髓腎虛耳聾目昏皆用之入藥須燒赤醋淬其玄石即磁石之黑色者也多滑淨其治體大同小異不可分而為二也磨針鋒則能指南然常偏東不全南也其法取新纊中獨縷以半芥子許蠟綴於針腰無風處垂之則針常指南以針橫貫燈心浮水上亦指南然常偏丙位蓋丙為大火庚辛金受其制故如是物理相感爾理石如長石但理石如石膏順理而細其非順理而細者為長石治療亦不相遼鐵礦鐵於礦中煉出者謂之生鐵鐵落斷而落者也鑐音柔鐵鐵炒成熟鐵也剛鐵鍊鐵去滓者也鐵精針沙鐵漿以上三等取汁各依經用鐵華粉鐵粉以上二等燒煅取馬銜稱錘車轄杵鋸以上五等特以其意使之耳其生鐵既自火中煉石而出世謂之生鐵亦如炒脂麻取油謂之生油其義亦同白油麻條中已著鐵粉以生薑汁調擦眉上生眉毛鋼鐵今用柔鐵屈盤乃以生鐵陷其間泥封煉之煅令相入謂之圍鋼又曰灌鋼此蓋草創之鋼亦不免偽也蓋生鐵之堅及三四煉則生鐵亦自熟卻是柔鐵而天下莫以為非磁州煉坊方識真鋼凡鐵之有鋼如面之有筋灌洸揉麵既盡筋乃見鍊鋼亦然恆取精鐵一百餘斤每鍛一火稱之遂輕纍鍛稱之至於不減耗此則純鋼也實鐵之精純者雖百鍊不耗矣其色清明磨瑩之則黯黯而清且黑亦有煉之盡全無鋼者系地之所産精粗爾前所謂鐵精者其説有二陶隱居言出煅灶中如塵紫色輕者為佳亦以摩瑩銅器用之日華子又云犁鑱尖浸水中名為鐵精本條既言化銅則隱居所説是蓋鍛灶中塵紫摩銅則明浸犁鑱尖水非是食鹽素問曰咸走血故東方食魚鹽之人多黑色走血之驗故可知矣病嗽及水者宜全禁之北狄用以淹尸取其不壞也至今如此若中蚯蚓毒當以鹽洗沃亦宜湯化飲汁其燒剝金銀熔汁作藥仍須解州池鹽為佳齒縫中多血出常以鹽湯嗽即已益齒走血之驗也太陰玄精石合他藥塗大風疾別有法陰證傷寒指甲面色青黑六脈沉細而疾心下脹滿結硬躁渴虛汗不止或時狂言四肢逆冷咽喉不利腹疼亦須佐他藥兼之圖經本草已有法惟出解州者良密陀僧堅重椎破如金色者佳桃花石有赤白兩等有赤地淡白點如桃花片者有淡白地有淡赤點如桃花片者人往往鐫磨為器用今人亦罕服食花乳石其色如硫黃本經第五卷中已著今出陝華間於黃石中間有淡白點以此得花之名今惠民局花乳石散者是此物陝人又能鐫為器圖經第二卷中易其名為花蕊石是卻取其色黃也更無花乳之名慮歲久為世所惑故書之珊瑚治翳目今人用為點眼箸有一等紅油色有細縱紋可愛又一種如鉛丹色無縱紋為下入藥用紅油色者嘗見一本高尺許兩枝直上分十餘歧將至其顛則交合連理仍紅潤有縱紋亦一異也波斯國海中有珊瑚洲海人乘大舶墮鐵網水底珊瑚所生磐石上白如菌一歲而黃三歲赤枝幹交錯高三四尺鐵發其根系網舶上絞而出之失時不取則腐馬腦非石非玉自是一類有紅白黑色三種亦有其紋如纏絲者出西裔者佳彼土人以小者碾為好玩之物大者碾為器今古方入藥絶可用此物西方甚重故佛經多言之其馬口吐出既知謬言不合編入石花白色圓如覆大馬杓上有百十枝每枝各槎牙分歧如鹿角上有細紋起以指撩之錚錚然有聲此石花也多生海中石上世方難得家中自有一本後又於大相國宮中見一本然其體甚脆不禁觸擊本條所注皆非是石蟹直是今之生蟹更無異處但有泥與粗石相著凡用須去其泥並粗石止用蟹磨合他藥點目中須水飛石蛇本經不收始自開寶本草添附其色如古牆上土盤結如楂梨大中空兩頭巨細一等無蓋不與石蟹同類蟹則真蟹也蛇非真蛇今人用之絶少
