body:
  text: 卷十九白瓜子實冬瓜仁也服食中亦稀用白冬瓜一二斗許大冬月收為菜壓去汁蜜煎代果患發背及一切癰疽削一大塊置瘡上熱則易之分敗熱毒氣甚良瓜蒂此即甜瓜蒂也去瓜皮用蒂約半寸許曝極干不限多少為細末量疾每用一二錢匕膩粉一錢匕以水半合同調勻灌之治風涎暴作氣塞倒臥服之良久涎自出或覺有涎用諸藥行化不下但如此服涎即出或服藥良久涎未出含沙糖一塊下咽即涎出此物甚不損人全勝石碌硇砂輩甜瓜暑月服之永不中暑氣多食未有不下痢者貧下多食至深秋作痢為難治為其消損陽氣故也亦可以如白冬瓜煎漬收冬葵子葵菜子也四方皆有苗性滑利不益人患癰癤毒熱內攻未出膿者水吞三五枚遂作竅膿出蜀葵四時取紅單葉者根陰乾治帶下排膿血惡物極有驗黃蜀葵花與蜀葵別種非為蜀葵中黃者也葉心下有紫檀色摘之剔為數處就日乾之不爾即浥爛瘡家為要藥子臨産時取四十九粒研爛用溫水調服良久産莧實入藥亦稀苗又謂之人莧人多食之莖高而葉紅黃二色者謂之紅人莧可淹菜用苦菜四方皆有在北道則冬方凋斃生南方則冬夏常青此月令小滿節後所謂苦菜秀者是此葉如苦苣更狹其緑色差淡折之白乳汁出常常點瘊子自落味苦花與野菊相似春夏秋皆旋開花去中熱安心神萵苣今菜中惟此自初生便堪生啖四方皆有多食昏人眼蛇亦畏之蟲入耳以汁滴耳中蟲出諸蟲不敢食其葉以其心置耳中留蟲出路蟲亦出有人自長立禁此一物不敢食至今目不昏苦苣搗汁傅疔瘡殊驗青苗陰乾以備冬月為末水調傅亦可蕪菁蘆蔔蕪菁蘆蔔二菜也蘆蔔即蘿蔔也蕪菁今世俗謂之蔓菁夏則枯當此之時蔬圃中復種之謂之雞毛菜食心正在春時諸菜之中有益無損於世有功採擷之餘收子為油根過食動氣河東太原所出極大他處不及也又出吐谷渾後於萊蔔條中爾雅釋草但名蘆蔔今謂之蘿蔔是也則蕪菁條中不合更言及蘆蔔二字顯見重復從爾雅為正萊蔔根即前條所謂蘆蔔今人只謂之蘿蔔河北甚多登萊亦好服地黃何首烏人食之則令人髭發白世皆言草木中惟此下氣速者為其辛也不然如生薑芥子又辛也何止能散而已萊蔔辛而又甘故能散緩而又下氣速也散氣用生薑下氣用萊蔔菘菜張仲景傷寒論凡用甘草皆禁菘菜者是此菘菜也葉如蕪菁緑色差淡其味微苦葉嫩稍闊不益中虛人食之覺冷芥似蕪菁葉上紋皺起色尤深緑為異子與苗皆辛子尤甚多食動風一品紫芥與此無異紫色可愛人多食之然亦動風又白芥子比諸芥稍大其色白入藥用苜蓿唐李白詩云天馬常銜苜蓿花是此陝西甚多飼牛馬嫩時人兼食之微甘淡不可多食利大小腸有宿根刈訖又生蓼實即神農本經第十一卷中水蓼之子也彼言蓼則用莖此言實即用子故此復論子之功故分為二條春初以葫蘆盛水浸濕高掛於火上晝夜使暖遂生紅芽取以為蔬以備五辛盤又一種水紅與此相類但苗莖高及丈取子微炒碾為細末薄酒調二三錢服治瘰癧久則效效則已蔥實蔥初生名蔥針至夏則有花於秋月植作高溝壠旋壅起以備冬用曰冬蔥其實一也又有龍角蔥每莖上出歧如角皮赤者名樓蔥可煎湯泄下部子皆辛黑色有皺紋作三瓣此物大抵以發散為功多食昏人神薤葉如金燈葉差狹而更光故古人言薤露者以其光滑難竚之義千金治肺氣喘急用薤白亦取其滑泄也與蜜同搗塗湯火傷效甚速韭春食則香夏食則臭多食則昏神子止精滑甚良未出糞土為韭黃最不益人食之即滯氣蓋含噎郁未之氣故如是孔子曰不時不食正為此輩花食之動風白蘘荷八九月間淹貯之以備冬月作蔬果治療只用生者蘇此紫蘇也背面皆紫者佳其味微辛甘能散其氣香今人朝暮湯其汁飲為無益醫家以謂芳草致豪貴之疾者此有一焉脾胃寒人飲之多泄滑往往不覺子治肺氣喘急水蘇氣味與紫蘇不同辛而不和然一如蘇但面不紫及周圍槎牙如雁齒香少假蘇荊芥也只用穗治産後血暈及中風目帶上四肢強直為末二三錢童子小便一小盞調下咽良久即活甚有驗又治頭目風荊芥穗細辛川芎等為末飯後湯點二錢風搔遍身濃煎湯淋泄或坐湯中香薷生山野荊湖南北二川皆有兩京作圃種暑月亦作蔬菜治霍亂不可闕也用之無不效葉如茵陳花茸紫在一邊成穗凡四五十房為一穗如荊芥穗別是一種香余如經薄荷世謂之南薄荷為有一種龍腦薄荷故言南以別之小兒驚風壯熱須此引藥貓食之即醉物相感爾治骨蒸熱勞用其汁與衆藥熬為膏蘩蔞雞腸草一物也今雖分之為二其雞腸草條中獨不言性味故知一物也雞腸草春開小花如緑豆大莖葉如園荽初生則直長大即覆地小戶收之為齊食之烏髭發葫葫大蒜也其氣極葷然置臭肉中掩臭氣中暑毒人爛嚼三兩瓣以溫水送之下咽即知仍禁飲冷水又患暴下血以葫五七枚去梗皮量多少入豆豉搗為膏可丸即丸梧子大以米飲下五六十丸無不愈者又鼻衄爛研一顆塗兩足心下才止便拭去又將紫皮者橫切作片子厚一分初患瘡發於背脅間未辨癰疽者若陽滯於陰即為癰陰滯於陽即為疽癰即皮光赤疽即皮肉紋起不澤並以葫片覆之用艾灸如已痛灸至不痛如不痛灸至痛初覺即便灸無不效者仍審度正於中心貼葫灸之世人往往不晤此瘡初見其瘡小不肯灸惜哉蒜蒜小蒜也又謂之蒚苗如蔥針根白大者如烏芋子兼根煮食之又謂之宅蒜華他用蒜齏是此物蕓薹不甚香經冬根不死闢蠹於諸菜中亦不甚佳茄子新羅國出一種淡光微紫色形長味甘今其子已遍中國蔬圃中惟此無益並無所治只說損人後人雖有處治之法然終與本經相失圃人又植於暖處厚加糞壤遂於小滿前後求貴價以售既不以時損人益多不時不食於可忽也馬齒莧人多食之然性寒滑青黛條中已著
