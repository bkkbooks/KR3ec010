body:
  text: 卷十四龍眼經曰一名益智今專為果未見入藥補注不言神農本草編入木部中品果部中復不曾收入今除為果之外別無龍眼若為益智子則專調諸氣今為果者復不能也矧自有益智條遠不相當故知木部龍眼即便是今為果者按今注云甘味歸脾而能益智此說甚當厚朴今西京伊陽縣及商州亦有但薄而色淡不如梓州者厚而紫色有油味苦不以薑製則棘人喉舌平胃散中用最調中至今此藥盛行既能溫脾胃氣又能走冷氣為世所須也豬苓行水之功多久服必損腎氣昏人目果欲久服者更宜詳審竹葉凡諸竹與筍性皆微寒故知葉其用一致本經不言筍及苦竹性若取瀝作油亦不必強擇也張仲景竹葉湯用淡竹筍難化不益脾鄰家一小兒方二歲偶失照管壯熱喘粗不食多睡仰頭呻吟微嘔逆瞑目多驚凡三五日醫作慢驚治之治不對病不愈忽然其母誤將有巴豆食藥作驚藥化五丸如麻子大灌之稍久大吐有物噎於喉中乳媼以指摘出之約長三寸粗如小指乃三日前臨階曝者干箭筍是夜諸證皆定次日但以和氣藥調治遂安其難化也如此經曰問而知之者謂之工小兒不能問故為難治醫者當慎謹也枳實枳實枳殼一物也小則其性酷而速大則其性詳而緩故張仲景治傷寒倉猝之病承氣湯中用枳實此其意也皆取其疏通決泄破結實之義他方但導敗風壅之氣可常服者故用枳殼其意如此山茱萸與吳茱萸甚不相類山茱萸色紅大如枸杞子吳茱萸如川椒初結子時其大小亦不過椒色正青得名則一治療又不同未審當日何緣如此命名然山茱萸補養腎臟無一不宜經與注所說備矣吳茱萸須深湯中浸去苦烈汁凡六七過始可用今文與注及注中藥法皆不言亦漏落也此物下氣最速腸虛人服之愈甚梔子仲景治發汗吐下後虛煩不得眠若劇者必反覆顛倒心中懊憹梔子豉湯治之虛故不用大黃有寒毒故也梔子雖寒無毒治胃中熱氣既亡血亡津液腑臟無潤養內生虛熱非此物不可去張仲景傷寒論已著又治心經留熱小便赤澀去皮山梔子火炮大黃連翹甘草炙等分末之水煎三二錢匕服之無不效檳榔二書所說甚詳今人又取尖長者入藥言其快鋭速效屢嘗試之果如其說合歡花其色如今之醮暈線上半白下半肉紅散垂如絲為花之異其緑葉至夜則合又謂之夜合花陳藏器日華子皆曰皮殺蟲又曰續筋骨經中不言秦椒此秦地所生者故言秦椒大率椒株皆相似秦椒但葉差大椒粒亦大而紋低不若蜀椒皺紋高為異也然秦地亦有蜀種椒如此區別衛矛所在山谷皆有之然未嘗於平陸地見也葉絶少其莖黃褐色若柏皮三面如鋒刃人家多燔之遣祟方家用之亦少紫葳今蔓延而生謂之為草又有木身謂之為木又須物而上然幹不逐冬斃亦得木之多也故分入木部為至當唐白樂天詩有木名凌霄擢秀非孤標由是益知非草也本經又云莖葉味苦是與瞿麥別一種甚明唐本注云且紫葳瞿麥皆本經所載若用瞿麥根為紫葳何得復用莖葉此說盡矣然其花赭黃色本條雖不言其花又卻言莖葉味苦則紫葳為花故可知矣蕪荑性溫治大腸寒滑不可缺也須佐以他藥為丸服溫而散走寒氣茗苦𣗪今茶也其文有陸羽茶經丁謂北苑茶録毛文錫茶譜蔡宗顏茶山節對其說甚詳然古人謂其芽為雀舌麥顆言其至嫩也又有新芽一發便長寸余微粗如針惟芽長為上品其根干水土力皆有餘故也如雀舌麥顆又下品前人未盡識誤為品題唐人有言曰釋滯消壅一日之利暫佳斯言甚當飲茶者宜原其始終又晉溫嶠上表貢茶千斤茗三百斤郭璞曰早採為茶晚採為茗茗或曰荈尺兗切葉老者也桑根白皮桑根白皮條中桑之用稍多然獨遺烏椹桑之精英盡在於此採摘微研以布濾去滓石器中熬成稀膏量多少入蜜再熬成稠膏貯瓷器中每抄一二錢食後夜臥以沸湯點服治服金石發熱渴生精神及小腸熱性微涼白棘一名棘針一名棘刺按經如此甚明諸家之意強生疑惑今掠不取求其經而可矣其白棘乃是取其肥盛紫色枝上有皺薄白膜先剝起者故曰白棘取白之意不過如此其棘刺花乃是棘上所開花也余無他義今人燒枝取油塗垢發使垢解龍腦條中與圖經所說各未盡此物大通利關膈熱塞其清香為百藥之先大人小兒風涎閉壅及暴得驚熱甚濟用然非常服之藥獨行則勢弱佐使則有功於茶亦相宜多則掩茶氣味萬物中香無出其右者西方抹羅矩吒國在南印度境有羯布羅香干如松株葉異濕時無香採干之後折之中有香狀類雲母色如冰雪此龍腦香也蓋西方亦有庵摩勒余甘子也解金石毒為末作湯點服佛經中所謂庵摩勒果者是此蓋西方亦有紫𨥥音礦如糖霜結於細枝上纍纍然紫黑色研破則紅今人用造綿煙脂邇來亦難得余如經天竹黃自是竹內所生如黃土著竹成片涼心經去風熱作小兒藥尤宜和緩故也天竺桂與牡菌桂同但薄而已烏藥和來氣少走泄多但不甚剛猛與沉香同磨作湯點治胸腹冷氣甚穩當沒藥大概通滯血打撲損疼痛皆以酒化服血滯則氣壅淤氣壅淤則經絡滿急經絡滿急故痛且腫凡打撲著肌肉須腫脹者經絡傷氣血不行壅淤故如是墨松之煙也世有以粟草灰僞為者不可用須松煙墨方可入藥然惟遠煙為佳今高麗國每貢墨於中國不知用何物合和不宜入藥此蓋未達不敢嘗之義又治大吐血好墨細末二錢以白湯化阿膠清調稀稠得所頓服熱多者尤相宜又鄜延界內有石油燃之煙甚濃其煤可為墨黑光如漆松煙不及其識文曰延川石液者是不可入藥當附於此
