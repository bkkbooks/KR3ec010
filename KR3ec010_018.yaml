body:
  text: 卷十八豆蔻草豆蔻也氣味極辛微香此是對肉豆蔻而名之若作果則味不和不知前人之意編入果部有何意義性溫而調散冷氣力甚速花性熱淹置京師然味不甚美微苦必為能消酒毒故為果花干則色淡紫葡萄先朝西夏持師子來獻使人兼齎葡萄遺州郡比中國者皆相似最難乾不幹不可收仍酸澌不可食李白所謂胡人歲獻葡萄酒者是此瘡疱不出食之盡出多食皆昏人眼波斯國所出大者如雞卵蓬藟非覆盆也自別是一種雖枯敗而枝梗不散今人不見用此即賈山策中所言者是此覆盆子覆盆子長條四五月紅熟秦州甚多永興華州亦有及時山中人採來賣其味酸甘外如荔枝櫻桃許大軟紅可愛失採則就枝生蛆益腎臟縮小便服之當覆其溺器如此取名食之多熱收時五六分熟便可採烈日曝仍須薄綿蒙之今人取汁作煎為果仍少加蜜或熬為稀湯點服治肺虛寒採時著水則不堪煎大棗今先青州次晉州此二等可曬曝入藥益脾胃為佳餘隻可充食用又云御棗甘美輕脆後衆棗熟以其甘故多生蟲今人所謂撲落酥者是又有牙棗先衆棗熟亦甘美但微酸尖長此二等只堪啖不堪收曝今人將干棗去核於鐺鍋中微火緩逼干為末量多少入生薑末為湯點服調和胃氣又將煮棗肉和治脾胃丸藥尤佳又青州棗去皮核焙乾為棗圈達都下為奇果雞頭實今天下皆有之河北沿溏濼居人採得舂去皮搗仁為粉蒸炸作餅可以代糧食多不益脾胃氣兼難消化藕實就蓬中乾者為石蓮子取其肉於砂盆中干擦去浮上赤色留青心為末少入龍腦為湯點寧心志清神然亦有粉紅千葉白千葉者皆不實如此是有四等也其根惟白蓮為佳今禁中又生碧蓮亦一瑞也芰今世俗謂之菱角所在有煮熟取仁食之代糧不益脾又有水菱亦芰也但大而脆可生食和合治療未聞其用有人食生芰多則利及難化是亦性冷栗栗欲干莫如曝欲生收莫如潤沙中藏至春末夏初尚如初收摘小兒不可多食生者難化熟即滯氣隔食生蟲往往致小兒病人亦不知所謂補腎氣者以其味鹹又滯其氣爾湖北路有一種栗頂圓末尖謂之旋栗圖經引詩言莘音榛栗者謂其象形也櫻桃孟詵以為櫻非桃類然非桃類蓋其以形肖桃故曰櫻桃又何疑焉謂如木猴梨胡桃之類亦取其形相似爾古謂之含桃可薦宗廟禮云先薦寢廟者是此唐王維詩云才是寢園春薦後非干御苑鳥銜殘小兒食之才過多無不作熱此果在三月末四月初間熟得正陽之氣先諸果熟性故熱今西洛一種紫櫻至熟時正紫色皮裡間有細碎黃點此最珍也今亦上供朝廷藥中不甚須橘柚自是兩種故曰一名橘皮是元無柚字也豈有兩等之物而治療無一字別者即知柚字為誤後人不深求其意為柚字所惑妄生分別亦以過矣且青橘與黃橘治療尚別矧柚為別種也郭璞云柚似橙而大於橘此即是識橘柚者也今若不如此言之恐後世亦以柚皮為橘皮是貽無窮之患矣去古既遠後之賢者亦可以意逆之耳橘惟用皮與核皮天下甚所須也仍湯浸去穰余如經與注核皮二者須自收為佳有人患氣嗽將期或教以橘皮生薑焙乾神麯等分為末丸桐子大食後夜臥米飲服三五十丸兼舊患膀胱緣服此偕愈然亦取其陳皮入藥此六陳中一陳也腎疰腰痛膀胱氣痛微炒核去殼為末酒調服愈乳柑子今人多作橘皮售於人不可不擇也柑皮不甚苦橘皮極苦至熟亦苦若以皮緊慢分別橘與柑又緣方宜各不同亦互有緊慢者脾腎冷人食其肉多致臟寒或泄痢橙子皮今人只以為果或取皮合湯待賓未見入藥宿酒未醒食之速醒梅實食梅則津液泄水生木也津液泄故傷齒腎屬水外為齒故也王叔和曰膀胱腎合為津府此語雖鄙然理存焉熏之為烏梅曝乾藏密器中為白梅枇杷葉江東西湖南北二川皆有之以其形如琵琶故名之治肺熱嗽有功花白最先春也子大如彈丸四五月熟色若黃杏微有毛肉薄性亦平與葉不同有婦人患肺熱久嗽身如炙肌瘦將成肺癆以枇杷葉木通款冬花紫菀杏仁桑白皮各等分大黃減半各如常制治訖同為末蜜丸如櫻桃大食後夜臥各含化一丸未終劑而愈柿有著蓋柿於蒂下別生一重又牛心柿如牛之心蒸餅柿如今之市買蒸餅華州有一等朱柿比諸品中最小深紅色又一種塔柿亦大於諸柿性皆涼不至大寒食之引痰極甘故如是去皮挂大木株上使風日中自干食之多動風火乾者味不佳生則澀以溫水養之需澀去可食逮至自然紅爛澀亦自去干則性平木瓜得木之正故入筋以鉛霜塗之則失醋味受金之制故如是今人多取西京大木瓜為佳其味和美至熟止青白色入藥絶有功勝宣州者味淡此物入肝故益筋與血病腰腎腳膝無力此物不可闕也甘蔗今川廣湖南北二浙江東西皆有自八九月已堪食收至三四月方酸壞石蜜沙糖糖霜皆自此出惟川浙者為勝石蜜川浙最佳其味厚其他次之煎煉成以鉶象物達京都至夏月及久陰雨多自消化土人先以竹葉及紙裹外用石灰埋之仍不得見風遂免今人謂乳糖其作餅黃白色者今人又謂之捻糖易消化入藥至少沙糖又次石蜜蔗汁清故費煎煉致紫黑色治心肺大腸熱兼啖駝馬今醫家治暴熱多以此物為先導小兒多食則損齒土製水也及生蚌蟲裸蟲屬土故因甘遂生芋所在有之江浙二川者最大而長京洛者差圓小而惟東西京者佳他處味不及也當心出苗者為芋頭四邊附芋頭而生者為芋子八九月以後可食至時掘出置十數日卻以好土勻埋至春猶好生則辛而涎多食滯氣困脾唐杜甫詩曰園收芋栗不全貧者是此以梗擦蜂螫處愈烏芋今人謂之荸薺皮厚色黑肉硬白者謂之豬荸薺皮薄澤色淡紫肉軟者謂之羊荸薺正二月人採食之此二等藥罕用荒歲人多采以充糧荔枝藥品中今未見用惟崔元亮方中收之果實中為上品多食亦令人發虛熱此物喜雙實尤可愛本朝有蔡君謨荔枝譜其説甚詳唐杜牧詩云一騎紅塵妃子笑無人知是荔枝來此是川蜀荔枝亦可生置之長安也以核熳火中燒存性為末新酒調一枚末服治心痛及小腸氣杏核仁犬傷人量所傷大小爛嚼沃破處以帛系定至瘥無苦又湯去皮研一升以水一升半翻覆絞取稠汁入生蜜四兩甘草一莖約一錢銀石器中熳火熬成稀膏瓷器盛食後夜臥入少酥沸湯點一匙匕服治肺燥喘熱大腸祕潤澤五臟如無上證更入鹽點尤佳杏實本經別無治療日華子言多食傷神有數種皆熱小兒尤不可食多致瘡癰及上膈熱曬蓄為乾果其深赭色核大而扁者為金杏此等須接其他皆不逮也如山杏輩只可收仁又有白杏至熟色青白或微黃其味甘淡而不酸桃核仁桃品亦多京畿有白桃光小於衆桃不益脾有赤點斑而光如塗油山中一種正是月令中桃始華者但花多子少不堪啖惟堪取仁唐文選謂山桃發紅萼者是矣又太原有金桃色深黃西京有崑崙桃肉深紫紅色此二種尤甘又餅子桃如今之香餅子如此數種入藥惟以山中自生者為正蓋取走泄為用不取肥好者如傷寒八九日間發熱如狂不解小腹滿痛有瘀血用桃仁三十個湯去皮尖麩炒赤色別研虻蟲三十枚去翅水蛭二十枚各炒川大黃一兩同為末再與桃仁同搗令勻煉蜜丸如小豆大每服二十丸桃仁湯下利下瘀血惡物便愈未利再服獼猴桃今永興軍南山甚多食之解實熱過多則令人臟寒泄十月爛熟色淡緑生則極酸子繁細其色如芥子枝條柔弱高二三丈多附木而生淺山傍道則有存者深山則多為猴所食胡桃胡桃發風陝洛之間甚多外有青皮包之胡桃乃核也核中穰為胡桃肉雖如此説用時須以湯剝去肉上薄皮過夏至則不堪食有人患酒㾴風鼻上赤將橘子核微炒為末每用一錢匕研胡桃肉一個同以溫酒調服以知為度李核仁其窠大者高及丈今醫家少用實合漿水食令人霍亂澀氣而然今畿內小窯鎮一種最佳堪入貢又有御李子如櫻桃許大紅黃色先諸李熟此李品甚多然天下皆有之所以比賢士大夫盛德及天下者如桃李無處不芬芳也別本注云有野李味苦名郁李子核仁入藥此自是郁李仁別是一種在木部第十四卷非野李也梨多食則動脾少則不及病用犁之意須當斟酌惟病酒煩渴人食之甚佳終不能卻疾庵羅果西洛甚多亦梨之類也其狀亦梨先諸梨熟七夕前後又堪啖色黃如鵝梨才熟便鬆軟入藥絶稀用安石榴有酸淡兩種旋開單葉花旋結實實中子紅孫枝甚多秋後經雨則自坼裂道家謂之三尸酒云三尸得此果則醉河陰縣最多又有一種子白瑩徹如水晶者味亦甘謂之水晶石榴惟酸石榴皮合斷下藥仍須老木所結及收之陳久者佳微炙為末以燒粟米飯為丸梧子大食前熱米飲下三十至五十丸以知為度如寒滑加附子赤石脂各一倍橄欖味澀食久則甘嚼汁咽治魚鯁榲桲食之須淨去上浮毛不爾損人肺花亦香白色諸果中惟此多生蟲少有不蛀者圖經言欲臥啖一兩枚而寢如此恐太多痞塞胃脘
