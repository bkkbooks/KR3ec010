body:
  text: 卷十一大黃大黃損益前書已具仲景治心氣不足吐血衄血瀉心湯用大黃黃芩黃連或曰心氣既不足矣而不用補心湯更用瀉心湯何也答曰若心氣獨不足則不當須吐衄也此乃邪熱因不足而客之故吐衄以苦泄其熱就以苦補其心蓋兩全之有是證者用之無不效量虛實用藥桔梗治肺熱氣奔促嗽逆肺癰排膿陶隱居云俗方用此乃名薺苨今別有薺苨所謂亂人參者便是非此桔梗也唐本注云陶引薺苨亂人參謬矣今詳之非也隱居所言其意只以根言之所以言亂人參唐本注卻以苗難之乃本注誤矣甘遂今惟用連珠者然經中不言此藥專於行水攻決為用入藥須斟酌葶藶葶藶用子子之味有甜苦兩等其形則一也經既言味辛苦即甜者不復更入藥也大概治體皆以行水走泄為用故曰久服令人虛蓋取苦泄之義其理甚明藥性論所說盡矣但不當言味酸蕘花今京洛間甚多張仲景傷寒論以蕘花治利者以其行水也水去則利止其意如此然今人用時當以意斟酌不可使過與不及也仍須是有是證者方可用旋覆花葉如大菊又如艾蒿八九月有花大如梧桐子花淡黃緑繁茂圓而覆下亦一異也其香過於菊行痰水去頭目風其味甘苦辛亦走散之藥也其旋花四月五月有花別一種非此花也第八卷已具藜蘆藜蘆為末細調治馬疥癢烏頭烏喙天雄附子側子凡五等皆一物也只以大小長短似像而名之後世補虛寒則須用附子仍取其端平而圓大及半兩以上者其力全不僭風家即多用天雄亦取其大者以其尖角多熱性不肯就下故取敷散也此用烏頭附子之大略如此餘三等則量其材而用之其炮製之法經方已著射干此乃荀子所說西方之木名曰射干者也注復引本草曰不合以射干為木殊不知五行只以水火木金土而言之故儒者以草木皆木也金鉛皆金也糞土皆土也灰火皆火也水池皆水也由是言之即非佛經所說火宅喻之獸及阮公所云臨層城者之木況本經亦曰一名草姜故知是草無疑今治肺氣喉痹為佳日華子曰大小似高良薑赤黃色此得之半夏今人惟知去痰不言益脾蓋能分水故也脾惡濕濕則濡而困困則不能制水經曰濕勝則瀉一男子夜數如廁或教以生薑一兩碎之半夏湯洗與大棗各三十枚水一升瓷瓶中慢火燒為熟水時時呷數日便已蜀漆常山苗也治瘧多吐人其他亦未見所長此草也慮歲久人或別有異論故預云余如經常山蜀漆根也亦治瘧吐痰如雞骨者佳青葙子經中並不言治眼藥性論始言之能治肝藏熱毒沖眼赤障青盲蕭炳可云理眼日華子云益腦髓明耳目鎮肝今人多用之治眼殊不與經意相當白蘞白芨古今服餌方少有用者多見於斂瘡方中二物多相須而行草蒿今青蒿也在處有之得春最早人剔以為蔬根赤葉香今人謂之青蒿亦有所別也但一類之中又取其青者陝西綏銀之間有青蒿在蒿叢之間時有一兩窠迥然青色土人謂之為香蒿莖葉與常蒿一同但常蒿色淡青此蒿色深青猶青故氣芬芳恐古人所用以深青者為勝不然諸蒿何嘗不青
